  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== MEMENTOURI ===== -->\n  <section id=\"v-rem\" style=\"display:none\">\n    <div class=\"card\">\n      <div class=\"aihero green\">\n        <div class=\"hb\"><i data-lucide=\"alarm-clock\"><\u002Fi><\u002Fdiv>\n        <div><b>Mementouri zilnice<\u002Fb><p>Primești o notificare la ora stabilită, în fiecare zi. Alege un memento rapid sau creează unul propriu.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"margin:8px 0\"><button class=\"btn sec sm\" onclick=\"askNotif();setTimeout(rRemView,600)\"><i data-lucide=\"bell-ring\"><\u002Fi>Activează notificările<\u002Fbutton><span class=\"muted\" id=\"remNotifState\"><\u002Fspan><\u002Fdiv>\n      <div class=\"pregrid\">\n        <button class=\"pretile\" onclick=\"addPreset('Mic dejun','08:00')\"><i data-lucide=\"egg-fried\"><\u002Fi>Mic dejun<span class=\"t\">08:00<\u002Fspan><\u002Fbutton>\n        <button class=\"pretile\" onclick=\"addPreset('Prânz','13:00')\"><i data-lucide=\"utensils\"><\u002Fi>Prânz<span class=\"t\">13:00<\u002Fspan><\u002Fbutton>\n        <button class=\"pretile\" onclick=\"addPreset('Cină','19:00')\"><i data-lucide=\"soup\"><\u002Fi>Cină<span class=\"t\">19:00<\u002Fspan><\u002Fbutton>\n        <button class=\"pretile\" onclick=\"addPreset('Cântărire','07:30')\"><i data-lucide=\"scale\"><\u002Fi>Cântărire<span class=\"t\">07:30<\u002Fspan><\u002Fbutton>\n        <button class=\"pretile\" onclick=\"addWaterPreset()\"><i data-lucide=\"glass-water\"><\u002Fi>Bea apă<span class=\"t\">la 2 ore<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"remList\"><\u002Fdiv>\n      <div class=\"mealadd\">\n        <div class=\"mealadd-h\"><i data-lucide=\"plus-circle\"><\u002Fi>Memento nou<\u002Fdiv>\n        <div class=\"g3\">\n          <div style=\"grid-column:span 2\"><label>Memento<\u002Flabel><input id=\"remLabel\" placeholder=\"ex: Ia vitaminele\"><\u002Fdiv>\n          <div><label>Ora<\u002Flabel><input id=\"remTime\" type=\"time\" value=\"09:00\"><\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"btn mealadd-btn\" onclick=\"addReminder()\"><i data-lucide=\"plus\"><\u002Fi>Adaugă memento<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SETĂRI ===== -->\n  <section id=\"v-set\" style=\"display:none\">\n    <details class=\"card setfold\">\n      <summary><i data-lucide=\"users-round\"><\u002Fi>Familia<span class=\"chev\"><i data-lucide=\"chevron-down\"><\u002Fi><\u002Fspan><\u002Fsummary>\n      <div class=\"foldbody\">\n      <p class=\"muted\">Membrul activ apare cu „activ\". Apasă pe pătratul de culoare ca s-o schimbi, sau „Folosește\" ca să comuți pe alt membru.<\u002Fp>\n      <div id=\"memList\" style=\"margin-top:8px\"><\u002Fdiv>\n      <button class=\"btn addmem-btn\" style=\"width:100%;margin-top:10px\" onclick=\"openAddMember()\"><i data-lucide=\"user-plus\"><\u002Fi>Adaugă un membru<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"card setfold\">\n      <summary><i data-lucide=\"refresh-cw\"><\u002Fi>Sincronizare între dispozitive<span class=\"chev\"><i data-lucide=\"chevron-down\"><\u002Fi><\u002Fspan><\u002Fsummary>\n      <div class=\"foldbody\">\n      <p class=\"muted\">Datele tale se salvează <b>criptate<\u002Fb> într-un gist privat GitHub. Le poți încărca pe orice dispozitiv cu același token și aceeași parolă. Nimeni — nici GitHub — nu le poate citi fără parola ta.<\u002Fp>\n      <div id=\"syncStatus\" class=\"muted\" style=\"margin:8px 0;font-size:13px\"><\u002Fdiv>\n      <label>Token GitHub (doar scope „gist\")<\u002Flabel><input id=\"syncToken\" type=\"password\" placeholder=\"ghp_…\">\n      <label>Parolă de criptare (o alegi tu — ține-o minte!)<\u002Flabel><input id=\"syncPass\" type=\"password\" placeholder=\"parola ta secretă\">\n      <div class=\"row\" style=\"margin-top:10px;flex-wrap:wrap\">\n        <button class=\"btn\" onclick=\"syncConnect()\"><i data-lucide=\"link\"><\u002Fi>Conectează<\u002Fbutton>\n        <button class=\"btn sec\" onclick=\"syncPush()\"><i data-lucide=\"cloud-upload\"><\u002Fi>Salvează în cloud<\u002Fbutton>\n        <button class=\"btn ghost\" onclick=\"syncPull()\"><i data-lucide=\"cloud-download\"><\u002Fi>Încarcă din cloud<\u002Fbutton>\n        <button class=\"btn warn\" onclick=\"syncDisconnect()\"><i data-lucide=\"unlink\"><\u002Fi>Deconectează<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"margin-top:8px\"><button class=\"btn sec grow\" onclick=\"shareSyncAccess()\"><i data-lucide=\"send\"><\u002Fi>Trimite acces altui dispozitiv<\u002Fbutton><\u002Fdiv>\n      <p class=\"muted\" style=\"margin-top:4px;font-size:12px\"><i data-lucide=\"shield-alert\" style=\"width:13px;height:13px;color:var(--amber);vertical-align:-2px\"><\u002Fi> Linkul conține tokenul și parola — trimite-l DOAR familiei tale, prin mesaj privat. Cine îl are vede și modifică datele.<\u002Fp>\n      <label>Sincronizare automată<\u002Flabel>\n      <select id=\"syncEvery\" onchange=\"SYNC.intervalMin=Number(this.value);saveSync();setupSyncTimer()\">\n        <option value=\"0\">Manual (doar la buton)<\u002Foption>\n        <option value=\"1\">La fiecare 1 minut<\u002Foption>\n        <option value=\"5\">La fiecare 5 minute<\u002Foption>\n        <option value=\"15\">La fiecare 15 minute<\u002Foption>\n        <option value=\"30\">La fiecare 30 minute<\u002Foption>\n      <\u002Fselect>\n      <details style=\"margin-top:10px\">\n        <summary class=\"muted\" style=\"cursor:pointer\">Cum obțin tokenul GitHub?<\u002Fsummary>\n        <ol class=\"steps\" style=\"margin-top:8px\">\n          <li>GitHub → <b>Settings<\u002Fb> → <b>Developer settings<\u002Fb> → <b>Personal access tokens → Tokens (classic)<\u002Fb> → <b>Generate new token (classic)<\u002Fb>.<\u002Fli>\n          <li>La „Select scopes\" bifează <b>DOAR<\u002Fb> căsuța <b>gist<\u002Fb>. Nimic altceva.<\u002Fli>\n          <li>Generează, copiază tokenul (<b>ghp_…<\u002Fb>) și lipește-l mai sus. Pune și o parolă de criptare pe care o ții minte.<\u002Fli>\n        <\u002Fol>\n        <p class=\"muted\">Tokenul stă doar local, pe dispozitivul tău. Cu scope „gist\" nu poate atinge codul tău, doar gist-urile.<\u002Fp>\n      <\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"card setfold\">\n      <summary><i data-lucide=\"sparkles\"><\u002Fi>Gemini AI (cheie &amp; model)<span class=\"chev\"><i data-lucide=\"chevron-down\"><\u002Fi><\u002Fspan><\u002Fsummary>\n      <div class=\"foldbody\">\n      <ol class=\"steps\">\n        <li>Intră pe <b>aistudio.google.com<\u002Fb> și loghează-te cu contul tău Google.<\u002Fli>\n        <li>Apasă <b>„Get API key”<\u002Fb> (stânga sus) → <b>„Create API key”<\u002Fb>.<\u002Fli>\n        <li>Copiază cheia (începe cu <b>AIza…<\u002Fb>) și lipește-o mai jos.<\u002Fli>\n      <\u002Fol>\n      <p class=\"muted\">Notă: abonamentul Gemini Pro din aplicația Gemini e separat de API. Cheia din AI Studio are un nivel gratuit — alege un model „flash\".<\u002Fp>\n      <label>Cheie API<\u002Flabel><input id=\"setKey\" type=\"password\" placeholder=\"AIza…\" onchange=\"S.settings.geminiKey=this.value.trim();save();toast('Cheie salvată')\">\n      <label>Model<\u002Flabel><select id=\"setModel\" onchange=\"S.settings.model=this.value;save()\">\n        <option value=\"gemini-3.1-flash-lite\">gemini-3.1-flash-lite (recomandat — ~500 cereri/zi)<\u002Foption>\n        <option value=\"gemini-2.5-flash-lite\">gemini-2.5-flash-lite (cotă mare)<\u002Foption>\n        <option value=\"gemini-2.5-flash\">gemini-2.5-flash (echilibrat)<\u002Foption>\n        <option value=\"gemini-2.0-flash\">gemini-2.0-flash (rapid)<\u002Foption>\n        <option value=\"gemini-2.5-pro\">gemini-2.5-pro (precis — cotă foarte mică)<\u002Foption>\n      <\u002Fselect>\n      <p class=\"muted\" style=\"margin-top:6px\">Dacă modelul atinge limita zilnică (429), aplicația <b>trece automat<\u002Fb> pe alt model gratuit. Cheia se salvează doar local. Asistentul din chat folosește mereu un model rapid (flash-lite) ca să răspundă cât mai repede.<\u002Fp>\n      <div id=\"aiMemBox\" style=\"margin-top:10px\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"card setfold\" id=\"pushCardFold\">\n      <summary><i data-lucide=\"mail-check\"><\u002Fi>Notificări pe email (telefon &amp; desktop)<span class=\"chev\"><i data-lucide=\"chevron-down\"><\u002Fi><\u002Fspan><\u002Fsummary>\n      <div class=\"foldbody\" id=\"pushCard\">\n      <p class=\"muted\">Primești notificările FamLink ca <b>email<\u002Fb> — pe telefon apar instant prin aplicația <b>Gmail<\u002Fb>, chiar și când FamLink e închis. Totul rulează gratuit, într-un mic script din contul tău Google. Configurezi o singură dată; setarea ajunge automat și la ceilalți membri prin sincronizare.<\u002Fp>\n      <div id=\"pushStatus\" class=\"muted\" style=\"margin:8px 0;font-size:13px\"><\u002Fdiv>\n      <details id=\"pushGuide\" style=\"margin:8px 0\">\n        <summary class=\"muted\" style=\"cursor:pointer;font-weight:600\">Ghid de activare (o singură dată, ~5 minute, de pe computer)<\u002Fsummary>\n        <ol class=\"steps\" style=\"margin-top:8px\">\n          <li>Apasă <b>„Copiază codul scriptului\"<\u002Fb> de mai jos — codul conține deja secretul tău.<\u002Fli>\n          <li>Deschide <b>script.google.com<\u002Fb>, loghează-te cu contul tău Google → <b>New project<\u002Fb> (Proiect nou).<\u002Fli>\n          <li>Șterge ce e în editor și <b>lipește codul<\u002Fb> (Cmd/Ctrl+V). Dă-i un nume, ex. „FamLink notificări\".<\u002Fli>\n          <li>Apasă <b>Deploy → New deployment<\u002Fb> → rotița din stânga → <b>Web app<\u002Fb>. Setează <b>Execute as: Me<\u002Fb> și <b>Who has access: Anyone<\u002Fb> → <b>Deploy<\u002Fb> → autorizează contul (dacă apare avertismentul „unverified\", apasă <b>Advanced → Go to…<\u002Fb>).<\u002Fli>\n          <li>Copiază <b>URL-ul Web app<\u002Fb> (se termină în <b>/exec<\u002Fb>), lipește-l mai jos și apasă <b>Testează<\u002Fb>.<\u002Fli>\n        <\u002Fol>\n      <\u002Fdetails>\n      <div class=\"row\" style=\"margin:8px 0;flex-wrap:wrap\">\n        <button class=\"btn sec\" onclick=\"pushCopyCode()\"><i data-lucide=\"clipboard-copy\"><\u002Fi>Copiază codul scriptului<\u002Fbutton>\n        <button class=\"btn ghost\" onclick=\"pushDlCode()\"><i data-lucide=\"download\"><\u002Fi>Descarcă .gs<\u002Fbutton>\n      <\u002Fdiv>\n      <label>URL-ul scriptului (…/exec)<\u002Flabel>\n      <input id=\"pushUrl\" placeholder=\"https://script.google.com/macros/s/…/exec\" onchange=\"setPushUrl(this.value)\">\n      <div class=\"row\" style=\"margin-top:8px\"><button class=\"btn\" onclick=\"pushTest()\"><i data-lucide=\"send\"><\u002Fi>Testează<\u002Fbutton><\u002Fdiv>\n      <p class=\"muted\" style=\"margin-top:8px;font-size:12.5px\"><b>Ai deja scriptul instalat?<\u002Fb> Pentru emailurile noi (aspect nou + invitație .ics pentru Calendarul iPhone) recopiază codul de mai sus, lipește-l peste cel vechi în script.google.com, apoi <b>Deploy → Manage deployments → Edit (creion) → Version: New version → Deploy<\u002Fb>. URL-ul rămâne același.<\u002Fp>\n      <label style=\"margin-top:12px\">Ce notificări primești pe email<\u002Flabel>\n      <div id=\"pushToggles\"><\u002Fdiv>\n      <div class=\"g2\" style=\"margin-top:8px\">\n        <div><label>Agenda zilei — la ora<\u002Flabel><input id=\"pushDigTime\" type=\"time\" value=\"07:30\" onchange=\"setDigestTime(this.value)\"><\u002Fdiv>\n        <div><label>Memento implicit la activități noi<\u002Flabel><select id=\"setDefNotify\" onchange=\"setDefNotify(this.value)\"><option value=\"\">Fără<\u002Foption><option value=\"0\">La ora exactă<\u002Foption><option value=\"10\">10 min înainte<\u002Foption><option value=\"30\">30 min înainte<\u002Foption><option value=\"60\">1 oră înainte<\u002Foption><option value=\"1440\">1 zi înainte<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"muted\" id=\"pushWho\" style=\"margin-top:8px;font-size:12.5px\"><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"card setfold\">\n      <summary><i data-lucide=\"bell\"><\u002Fi>Notificări &amp; afișare<span class=\"chev\"><i data-lucide=\"chevron-down\"><\u002Fi><\u002Fspan><\u002Fsummary>\n      <div class=\"foldbody\">\n      <div class=\"row\"><button class=\"btn sec\" onclick=\"askNotif()\"><i data-lucide=\"bell-ring\"><\u002Fi>Activează notificările<\u002Fbutton><span class=\"muted\" id=\"notifState\"><\u002Fspan><\u002Fdiv>\n      <div class=\"row\" style=\"margin-top:8px\"><button class=\"btn ghost\" onclick=\"askUser(true)\"><i data-lucide=\"user-round\"><\u002Fi>Schimbă utilizatorul<\u002Fbutton><\u002Fdiv>\n      <label style=\"display:flex;align-items:center;gap:9px;margin-top:12px;font-weight:600;cursor:pointer\"><input type=\"checkbox\" id=\"setVoiceAuto\" onchange=\"S.settings.voiceAutoSend=this.checked;save();toast(this.checked?'Trimitere automată pornită':'Trimitere automată oprită')\" style=\"width:18px;height:18px;accent-color:var(--pri);flex:none\"> Trimite dictarea automat când te oprești<\u002Flabel>\n      <p class=\"muted\" style=\"margin:4px 0 0\">La microfon, după ~2s de liniște trimite singur la asistent. Dacă e oprit, apeși tu „Gata\".<\u002Fp>\n      <label>Format printare<\u002Flabel>\n      <select id=\"setPrint\" onchange=\"S.settings.printSize=this.value;save();applyPage()\"><option value=\"A4\">A4 landscape<\u002Foption><option value=\"A3\">A3 landscape<\u002Foption><\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"card setfold\">\n      <summary><i data-lucide=\"calendar-plus\"><\u002Fi>Export calendar (iPhone / Email)<span class=\"chev\"><i data-lucide=\"chevron-down\"><\u002Fi><\u002Fspan><\u002Fsummary>\n      <div class=\"foldbody\">\n      <p class=\"muted\">Exportă activitățile ca fișier .ics — se deschide direct în Calendarul de iPhone / Google Calendar. Îl poți trimite și pe email.<\u002Fp>\n      <label style=\"margin-top:10px\">Ce categorii intră în export<\u002Flabel>\n      <div class=\"chips\" id=\"icsCats\"><\u002Fdiv>\n      <div class=\"row\" style=\"margin-top:10px\">\n        <button class=\"btn\" onclick=\"exportICS('all')\"><i data-lucide=\"download\"><\u002Fi>Descarcă tot (.ics)<\u002Fbutton>\n        <button class=\"btn sec\" onclick=\"exportICS('month')\"><i data-lucide=\"download\"><\u002Fi>Luna curentă<\u002Fbutton>\n        <button class=\"btn ghost\" onclick=\"shareICS()\"><i data-lucide=\"mail\"><\u002Fi>Trimite pe email<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdetails>\n\n    <details class=\"card setfold\">\n      <summary><i data-lucide=\"database\"><\u002Fi>Date &amp; backup<span class=\"chev\"><i data-lucide=\"chevron-down\"><\u002Fi><\u002Fspan><\u002Fsummary>\n      <div class=\"foldbody\">\n      <div class=\"row\">\n        <button class=\"btn sec\" onclick=\"backup()\"><i data-lucide=\"download\"><\u002Fi>Backup JSON<\u002Fbutton>\n        <button class=\"btn ghost\" onclick=\"document.getElementById('restoreF').click()\"><i data-lucide=\"upload\"><\u002Fi>Restaurează<\u002Fbutton>\n        <input type=\"file\" id=\"restoreF\" accept=\".json\" style=\"display:none\" onchange=\"restore(this)\">\n        <button class=\"btn warn\" onclick=\"if(confirm('Sigur ștergi TOATE datele?')){localStorage.removeItem(KEY);location.reload()}\"><i data-lucide=\"trash-2\"><\u002Fi>Reset<\u002Fbutton>\n      <\u002Fdiv>\n      <p class=\"muted\" style=\"margin-top:8px\">FamLink v2.1 — datele stau local (sau criptate în cloud dacă activezi sincronizarea).<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fsection>\n<\u002Fmain>\n\n<!-- Event modal -->\n<div class=\"mback\" id=\"evBack\" onclick=\"if(event.target===this)closeEvent()\">\n  <div class=\"modal\">\n    <div class=\"mhead\"><h2 id=\"evTitle\" style=\"margin:0\">Activitate<\u002Fh2><button class=\"x\" onclick=\"closeEvent()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <label>Titlu<\u002Flabel><input id=\"eT\" placeholder=\"ex: Fotbal David / Cină în familie\">\n    <div class=\"g3\">\n      <div><label>Data<\u002Flabel><input id=\"eD\" type=\"date\"><\u002Fdiv>\n      <div><label>Ora<\u002Flabel><input id=\"eH\" type=\"time\"><\u002Fdiv>\n      <div><label>Durată (min)<\u002Flabel><input id=\"eDur\" type=\"number\" value=\"60\" min=\"5\" step=\"5\"><\u002Fdiv>\n    <\u002Fdiv>\n    <label>Categorie<\u002Flabel>\n    <div class=\"chips\" id=\"eCats\"><\u002Fdiv>\n    <label>Cine participă<\u002Flabel>\n    <div class=\"chips\" id=\"eMems\"><\u002Fdiv>\n    <div class=\"g3\">\n      <div><label>Repetare<\u002Flabel><select id=\"eRf\"><option value=\"none\">Nu se repetă<\u002Foption><option value=\"d\">Zilnic<\u002Foption><option value=\"w\">Săptămânal<\u002Foption><option value=\"m\">Lunar<\u002Foption><option value=\"y\">Anual<\u002Foption><\u002Fselect><\u002Fdiv>\n      <div><label>La fiecare<\u002Flabel><input id=\"eRi\" type=\"number\" value=\"1\" min=\"1\"><\u002Fdiv>\n      <div><label>Până la<\u002Flabel><input id=\"eRu\" type=\"date\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"g2\">\n      <div><label>Notificare înainte<\u002Flabel><select id=\"eN\"><option value=\"\">Fără<\u002Foption><option value=\"0\">La ora exactă<\u002Foption><option value=\"10\">10 min<\u002Foption><option value=\"30\">30 min<\u002Foption><option value=\"60\">1 oră<\u002Foption><option value=\"1440\">1 zi<\u002Foption><\u002Fselect><\u002Fdiv>\n      <div><label>Notițe<\u002Flabel><input id=\"eNo\" placeholder=\"opțional\"><\u002Fdiv>\n    <\u002Fdiv>\n    <label id=\"eMailRow\" style=\"display:none;align-items:center;gap:9px;margin-top:12px;font-weight:600;cursor:pointer\"><input type=\"checkbox\" id=\"eMail\" checked=\"\" style=\"width:18px;height:18px;accent-color:var(--pri);flex:none\"> Anunță familia pe email (cu invitație pentru Calendar iPhone)<\u002Flabel>\n    <div class=\"row\" style=\"margin-top:14px\">\n      <button class=\"btn grow\" onclick=\"saveEvent()\"><i data-lucide=\"save\"><\u002Fi>Salvează<\u002Fbutton>\n      <button class=\"btn ghost\" onclick=\"icsOne()\" id=\"eIcsBtn\" title=\"Adaugă în calendarul iPhone\"><i data-lucide=\"calendar-plus\"><\u002Fi><\u002Fbutton>\n      <button class=\"btn warn\" id=\"eDel\" onclick=\"delEvent()\" style=\"display:none\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Zi modal -->\n<div class=\"mback\" id=\"dayBack\" onclick=\"if(event.target===this)closeDayModal()\">\n  <div class=\"modal\" style=\"max-width:460px\">\n    <div class=\"mhead\"><h2 style=\"margin:0;font-size:16px\" id=\"dayModalTitle\"><\u002Fh2><button class=\"x\" onclick=\"closeDayModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div id=\"dayModalList\"><\u002Fdiv>\n    <button class=\"btn\" style=\"width:100%;margin-top:12px\" onclick=\"closeDayModal();openEvent(null,VD.d)\"><i data-lucide=\"plus\"><\u002Fi>Adaugă activitate în această zi<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Opțiuni Salvează PDF -->\n<div class=\"mback\" id=\"pdfBack\" onclick=\"if(event.target===this)closePdfModal()\">\n  <div class=\"modal\" style=\"max-width:460px\">\n    <div class=\"mhead\"><h2 style=\"margin:0;font-size:17px\"><i data-lucide=\"file-down\"><\u002Fi>Ce apare pe PDF<\u002Fh2><button class=\"x\" onclick=\"closePdfModal()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <label>Categorii incluse<\u002Flabel>\n    <div class=\"chips\" id=\"pdfCats\"><\u002Fdiv>\n    <label style=\"display:flex;align-items:center;gap:9px;margin-top:12px;font-weight:600;cursor:pointer\"><input type=\"checkbox\" id=\"pdfSkipDaily\" onchange=\"S.settings.pdfSkipDaily=this.checked;save();rPdfModal()\" style=\"width:18px;height:18px;accent-color:var(--pri);flex:none\"> Ascunde activitățile repetate zilnic (ex. „06:05 Sport\")<\u002Flabel>\n    <p class=\"muted\" id=\"pdfCount\" style=\"margin:10px 0 0\"><\u002Fp>\n    <div class=\"row\" style=\"margin-top:14px\">\n      <button class=\"btn grow\" onclick=\"doSavePDF()\"><i data-lucide=\"file-down\"><\u002Fi>Generează PDF<\u002Fbutton>\n      <button class=\"btn ghost\" onclick=\"closePdfModal()\">Anulează<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Adaugă membru modal -->\n<div class=\"mback\" id=\"memBack\" onclick=\"if(event.target===this)closeAddMember()\">\n  <div class=\"modal\" style=\"max-width:420px\">\n    <div class=\"mhead\"><h2 style=\"margin:0\" id=\"memModalTitle\"><i data-lucide=\"user-plus\"><\u002Fi>Adaugă un membru<\u002Fh2><button class=\"x\" onclick=\"closeAddMember()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <div class=\"row\" style=\"gap:10px;align-items:flex-end\">\n      <div class=\"grow\"><label>Nume<\u002Flabel><input id=\"nmName\" placeholder=\"ex: Ana\"><\u002Fdiv>\n      <div><label>Culoare<\u002Flabel><input id=\"nmColor\" type=\"color\" value=\"#3b82c4\" style=\"height:41px;width:52px\"><\u002Fdiv>\n    <\u002Fdiv>\n    <label>Email (opțional — pentru invitații în calendar)<\u002Flabel><input id=\"nmEmail\" type=\"email\" placeholder=\"nume@email.com\">\n    <div class=\"row\" style=\"margin-top:14px\"><button class=\"btn grow\" id=\"memSaveBtn\" onclick=\"saveMember()\"><i data-lucide=\"user-plus\"><\u002Fi>Adaugă membru<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Motto modal -->\n<div class=\"mback\" id=\"mottoBack\" onclick=\"if(event.target===this)closeMotto()\">\n  <div class=\"modal\" style=\"max-width:440px\">\n    <div class=\"mhead\"><h2 style=\"margin:0\"><i data-lucide=\"quote\"><\u002Fi>Motto-ul lunii<\u002Fh2><button class=\"x\" onclick=\"closeMotto()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <p class=\"muted\" id=\"mottoSub\" style=\"margin:0 0 8px\"><\u002Fp>\n    <input id=\"mottoInput\" maxlength=\"70\" placeholder=\"ex: O vară cu familia\" onkeydown=\"if(event.key==='Enter')saveMotto()\">\n    <div class=\"row\" style=\"margin-top:14px\">\n      <button class=\"btn grow\" onclick=\"saveMotto()\"><i data-lucide=\"save\"><\u002Fi>Salvează<\u002Fbutton>\n      <button class=\"btn warn\" id=\"mottoDel\" onclick=\"delMotto()\" style=\"display:none\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- User picker modal -->\n<div class=\"mback\" id=\"userBack\">\n  <div class=\"modal\" style=\"max-width:400px\">\n    <div class=\"mhead\"><h2 style=\"margin:0\"><i data-lucide=\"user-round\"><\u002Fi>Cine folosește aplicația?<\u002Fh2><\u002Fdiv>\n    <p class=\"muted\" style=\"margin:0 0 10px\">Alege membrul activ — profilul, mesele și obiectivele se vor lega de el.<\u002Fp>\n    <div id=\"userPick\" class=\"chips\" style=\"flex-direction:column;gap:8px\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Panou notificări -->\n<div id=\"notifPanel\">\n  <div class=\"npanel-head\"><span>Notificări<\u002Fspan><button onclick=\"clearNotifs()\">Șterge tot<\u002Fbutton><\u002Fdiv>\n  <div id=\"notifList\" class=\"npanel-list\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Asistent flotant -->\n<button id=\"askFab\" onclick=\"toggleAsk()\" aria-label=\"Asistent\"><i data-lucide=\"sparkles\"><\u002Fi><span>Asistent<\u002Fspan><\u002Fbutton>\n<div id=\"askPanel\">\n  <div class=\"askhead\">\n    <div class=\"askava\"><i data-lucide=\"sparkles\"><\u002Fi><\u002Fdiv>\n    <div class=\"askwho\"><b>Asistentul FamLink<\u002Fb><small><span class=\"askdot\"><\u002Fspan>calendar și sănătate, pentru familia ta<\u002Fsmall><\u002Fdiv>\n    <button class=\"x\" onclick=\"toggleAsk()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton>\n  <\u002Fdiv>\n  <div id=\"askLog\" class=\"asklog\"><\u002Fdiv>\n  <div class=\"askrow\">\n    <input id=\"askInput\" placeholder=\"Vorbește sau scrie…\" onkeydown=\"if(event.key==='Enter')askSend()\" oninput=\"askBarSync()\">\n    <button id=\"askSendBtn\" class=\"btn sendbtn\" onclick=\"askSend()\" title=\"Trimite\" style=\"display:none\"><i data-lucide=\"send\"><\u002Fi><\u002Fbutton>\n    <button id=\"askMic\" class=\"micbtn\" onclick=\"askVoice()\" title=\"Vorbește\"><i data-lucide=\"mic\"><\u002Fi><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Confirmare activități AI -->\n<div class=\"mback\" id=\"confBack\" onclick=\"if(event.target===this)confirmEvents(false)\">\n  <div class=\"modal\" style=\"max-width:440px\">\n    <div class=\"mhead\"><h2 style=\"margin:0\" id=\"confTitle\"><i data-lucide=\"calendar-check\"><\u002Fi>Vrei să adaugi?<\u002Fh2><button class=\"x\" onclick=\"confirmEvents(false)\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <p class=\"muted\" id=\"confReason\" style=\"margin:0 0 8px\"><\u002Fp>\n    <div id=\"confList\"><\u002Fdiv>\n    <div class=\"row\" style=\"margin-top:14px\">\n      <button class=\"btn grow\" onclick=\"confirmEvents(true)\"><i data-lucide=\"check\"><\u002Fi>Da, adaugă<\u002Fbutton>\n      <button class=\"btn sec\" onclick=\"confirmEvents('edit')\"><i data-lucide=\"pencil\"><\u002Fi>Modifică<\u002Fbutton>\n      <button class=\"btn ghost\" onclick=\"confirmEvents(false)\" title=\"Renunță\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Camera modal -->\n<div class=\"mback\" id=\"camBack\" onclick=\"if(event.target===this)closeCamera()\">\n  <div class=\"modal\" style=\"max-width:480px\">\n    <div class=\"mhead\"><h2 style=\"margin:0\"><i data-lucide=\"camera\"><\u002Fi>Fă o poză mesei<\u002Fh2><button class=\"x\" onclick=\"closeCamera()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>\n    <video id=\"camVideo\" playsinline=\"\" autoplay=\"\" muted=\"\" style=\"width:100%;border-radius:14px;background:#000;max-height:58vh;object-fit:cover\"><\u002Fvideo>\n    <div class=\"row\" style=\"margin-top:12px;justify-content:center\">\n      <button class=\"btn\" onclick=\"snapPhoto()\" style=\"padding:12px 22px\"><i data-lucide=\"aperture\"><\u002Fi>Capturează<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Voice overlay -->\n<div class=\"voback\" id=\"voBack\">\n  <div class=\"vocard\">\n    <div class=\"vomic\"><i data-lucide=\"mic\"><\u002Fi><\u002Fdiv>\n    <div class=\"volbl\" id=\"voLbl\">Ascult…<\u002Fdiv>\n    <div class=\"votxt dim\" id=\"voTxt\">Spune activitatea, ex: „cină în familie sâmbătă la 19\"<\u002Fdiv>\n    <div class=\"row\" style=\"justify-content:center;gap:8px\">\n      <button class=\"btn ghost\" onclick=\"voiceStop('cancel')\"><i data-lucide=\"x\"><\u002Fi>Anulează<\u002Fbutton>\n      <button class=\"btn sec\" onclick=\"voiceStop('edit')\"><i data-lucide=\"pencil\"><\u002Fi>Editează<\u002Fbutton>\n      <button class=\"btn\" onclick=\"voiceStop('add')\"><i data-lucide=\"check\"><\u002Fi>Gata<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"toast\"><\u002Fdiv>\n<div id=\"printArea\"><\u002Fdiv>\n<script>\n/* ============ FamLink v1.0 — arhitectură ArhiLink (single-file, localStorage) ============ */\nconst KEY='famlink_v1';\nconst CATS={familie:{n:'Familie',c:'#16a37f',i:'users-round'},sport:{n:'Sport',c:'#3b82c4',i:'dumbbell'},scoala:{n:'Școală',c:'#f0a828',i:'book-open'},sanatate:{n:'Sănătate',c:'#e85d75',i:'heart-pulse'},munca:{n:'Muncă',c:'#7c5cd6',i:'briefcase'},eveniment:{n:'Eveniment',c:'#0d9aa5',i:'party-popper'},altele:{n:'Altele',c:'#7d938c',i:'pin'}};\nconst MONTHS=['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];\nconst DAYS=['duminică','luni','marți','miercuri','joi','vineri','sâmbătă'];\n\nlet S = load();\nfunction defState(){return {members:[{id:'m1',name:'Eu',color:'#16a37f',email:''}],events:[],goals:[],mottos:{},tomb:{},diet:{profiles:{},weights:{},meals:[],sports:[],water:{},fasting:{active:false,start:null,hours:16,history:[]}},settings:{geminiKey:'',model:'gemini-2.5-flash',printSize:'A4',activeUser:'',reminders:[],aiMemory:[],voiceAutoSend:true}};}\nfunction tombstone(id){S.tomb=S.tomb||{};S.tomb[id]=Date.now();}\nfunction load(){try{const d=JSON.parse(localStorage.getItem(KEY));if(d&&d.members){const s=Object.assign(defState(),d);s.diet=Object.assign(defState().diet,d.diet||{});s.settings=Object.assign(defState().settings,d.settings||{});return s;}}catch(e){}return defState();}\nfunction save(){localStorage.setItem(KEY,JSON.stringify(S));if(typeof schedulePush==='function')schedulePush();}\nconst uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);\nconst pad=n=>String(n).padStart(2,'0');\nconst dstr=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());\nconst fromStr=s=>{const[a,b,c]=s.split('-').map(Number);return new Date(a,b-1,c);};\nconst todayStr=()=>dstr(new Date());\nconst esc=s=>String(s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));\nfunction toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),2600);}\nfunction LI(){if(window.lucide)try{lucide.createIcons();}catch(e){}}\nconst memById=id=>S.members.find(m=>m.id===id);\nconst initial=m=>(m.name||'?').trim().charAt(0).toUpperCase();\nconst avatar=(m,cls)=>`<span class=\"${cls||'av'}\" style=\"background:${m.color}\">${initial(m)}<\u002Fspan>`;\n\n/* ---------- view state ---------- */\nconst CALV=['month','year','day','goals'];\nlet VIEW='month',calSub='month';\nlet VM={y:new Date().getFullYear(),m:new Date().getMonth()};   // month view\nlet VY=new Date().getFullYear();                                // year view\nlet VD={d:todayStr()};                                          // day view\nlet gScope='m';\n\nfunction go(v){\n  if(v==='cal')v=calSub;\n  if(CALV.includes(v))calSub=v;\n  VIEW=v;\n  document.querySelectorAll('main>section').forEach(s=>s.style.display='none');\n  document.getElementById('v-'+v).style.display='';\n  document.getElementById('calTabs').style.display=CALV.includes(v)?'':'none';\n  document.querySelectorAll('#calTabs [data-cs]').forEach(b=>b.classList.toggle('on',b.dataset.cs===v));\n  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',(b.dataset.v==='cal'&&CALV.includes(v))||(b.dataset.v==='health'&&v==='health')||(b.dataset.v==='rem'&&v==='rem')));\n  render();\n}\nfunction render(){rMotto();if(VIEW==='month')rMonth();else if(VIEW==='year')rYear();else if(VIEW==='day')rDay();else if(VIEW==='goals')rGoals();else if(VIEW==='health')rDiet();else if(VIEW==='rem')rRemView();else if(VIEW==='set')rSet();LI();}\nfunction rRemView(){\n  rReminders();\n  const el=document.getElementById('remNotifState');\n  if(el)el.textContent=('Notification' in window)?({granted:'notificări active ✓',denied:'notificări blocate ✕',default:'notificări inactive'}[Notification.permission]):'notificări nesuportate';\n}\n\n/* ---------- recurrence ---------- */\nfunction occursOn(ev,ds){\n  if(ev.date===ds)return true;\n  if(!ev.recur||ev.recur.f==='none')return false;\n  const a=fromStr(ev.date),b=fromStr(ds);\n  if(b<a)return false;\n  if(ev.recur.until&&ds>ev.recur.until)return false;\n  const i=Math.max(1,ev.recur.int||1);\n  const days=Math.round((b-a)/864e5);\n  switch(ev.recur.f){\n    case 'd':return days%i===0;\n    case 'w':return a.getDay()===b.getDay()&&(days/7)%i===0;\n    case 'm':{if(a.getDate()!==b.getDate())return false;const mo=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());return mo%i===0;}\n    case 'y':{if(a.getDate()!==b.getDate()||a.getMonth()!==b.getMonth())return false;return (b.getFullYear()-a.getFullYear())%i===0;}\n  }\n  return false;\n}\nconst eventsOn=ds=>S.events.filter(e=>occursOn(e,ds)).sort((x,y)=>(x.time||'99')<(y.time||'99')?-1:1);\n/* filtru pe membru: 'all' = tot; id = activitățile membrului + cele comune (fără persoane) */\nlet calFilter='all';\nfunction evVisible(e){if(calFilter==='all')return true;const ms=e.members||[];return ms.length===0||ms.includes(calFilter);}\n/* culoare pe ecran: 1 participant = culoarea lui (individual), altfel verde (familie/comun) */\nfunction evColor(e){const ms=(e.members||[]).filter(id=>memById(id));return ms.length===1?(memById(ms[0]).color||'#16a37f'):'#16a37f';}\nfunction setCalFilter(f){calFilter=f;render();}\nfunction filterBar(){\n  if(S.members.length<2)return '';\n  return `<button class=\"chip${calFilter==='all'?' on':''}\" onclick=\"setCalFilter('all')\"><i data-lucide=\"users-round\"><\u002Fi>Toți<\u002Fbutton>`+\n    S.members.map(m=>`<button class=\"chip${calFilter===m.id?' on':''}\" onclick=\"setCalFilter('${m.id}')\" style=\"${calFilter===m.id?'border-color:'+m.color+';color:'+m.color:''}\">${avatar(m,'avs')} ${esc(m.name)}<\u002Fbutton>`).join('');\n}\n\n/* ---------- motto ---------- */\nconst ymKey=()=>VM.y+'-'+pad(VM.m+1);\nfunction curYm(){const n=new Date();return n.getFullYear()+'-'+pad(n.getMonth()+1);}\nfunction rMotto(){const k=(VIEW==='month')?ymKey():curYm();const m=S.mottos[k];document.getElementById('hMotto').textContent=m?('„'+m+'”'):'＋ motto-ul lunii';}\nlet mottoKey=null;\nfunction editMotto(){\n  mottoKey=(VIEW==='month')?ymKey():curYm();\n  const parts=mottoKey.split('-'),mi=Number(parts[1])-1;\n  document.getElementById('mottoSub').textContent='Pentru '+MONTHS[mi].charAt(0).toUpperCase()+MONTHS[mi].slice(1)+' '+parts[0];\n  const cur=S.mottos[mottoKey]||'';\n  document.getElementById('mottoInput').value=cur;\n  document.getElementById('mottoDel').style.display=cur?'':'none';\n  document.getElementById('mottoBack').classList.add('show');\n  LI();\n  setTimeout(()=>document.getElementById('mottoInput').focus(),60);\n}\nfunction closeMotto(){document.getElementById('mottoBack').classList.remove('show');}\nfunction saveMotto(){if(!mottoKey)return;const v=document.getElementById('mottoInput').value.trim();if(v)S.mottos[mottoKey]=v;else delete S.mottos[mottoKey];save();rMotto();closeMotto();toast(v?'Motto salvat':'Motto șters');}\nfunction delMotto(){if(!mottoKey)return;delete S.mottos[mottoKey];save();rMotto();closeMotto();toast('Motto șters');}\n\n/* ---------- MONTH ---------- */\nfunction mvMonth(d){VM.m+=d;if(VM.m<0){VM.m=11;VM.y--;}if(VM.m>11){VM.m=0;VM.y++;}rMonth();rMotto();}\nfunction mToday(){const n=new Date();VM={y:n.getFullYear(),m:n.getMonth()};rMonth();rMotto();}\nfunction rMonth(){\n  document.getElementById('mTitle').textContent=MONTHS[VM.m].charAt(0).toUpperCase()+MONTHS[VM.m].slice(1)+' '+VM.y;\n  const mf=document.getElementById('mFilter');if(mf)mf.innerHTML=filterBar();\n  const first=new Date(VM.y,VM.m,1);\n  const start=new Date(first); start.setDate(1-((first.getDay()+6)%7)); // Monday start\n  let h='';const tds=todayStr();\n  for(let i=0;i<42;i++){\n    const d=new Date(start); d.setDate(start.getDate()+i);\n    if(i===35&&d.getMonth()!==VM.m)break;\n    const ds=dstr(d),out=d.getMonth()!==VM.m,wknd=d.getDay()===0||d.getDay()===6;\n    const evs=eventsOn(ds).filter(evVisible).filter(e=>!(e.doneOn&&e.doneOn.includes(ds))); // ascunde activitățile terminate din gridul lunar\n    let chips='';\n    const maxShow=window.innerWidth<560?2:3;\n    evs.slice(0,maxShow).forEach(e=>{const c=evColor(e);chips+=`<div class=\"evchip\" style=\"background:${c}\">${e.time?e.time+' ':''}${esc(e.title)}<\u002Fdiv>`;});\n    if(evs.length>maxShow)chips+=`<div class=\"moreev\">+${evs.length-maxShow}<\u002Fdiv>`;\n    h+=`<div class=\"dcell${out?' out':''}${ds===tds?' today':''}${wknd?' wknd':''}\" onclick=\"openDayModal('${ds}')\"><div class=\"dnum\">${d.getDate()}<\u002Fdiv>${chips}<\u002Fdiv>`;\n  }\n  document.getElementById('mGrid').innerHTML=h;\n  // goals of month card\n  const gs=S.goals.filter(g=>g.ym===ymKey());\n  document.getElementById('mGoalsCard').innerHTML='<div class=\"spread\"><h3 style=\"margin:0\"><i data-lucide=\"target\"><\u002Fi>Obiectivele lunii<\u002Fh3><button class=\"btn sm sec\" onclick=\"go(\\'goals\\')\">Vezi tot<\u002Fbutton><\u002Fdiv>'+\n    (gs.length?gs.map(g=>`<div class=\"goal${g.done?' done':''}\"><input type=\"checkbox\" ${g.done?'checked':''} onchange=\"tglGoal('${g.id}')\"><span class=\"grow\">${esc(g.title)}<\u002Fspan>${g.memberId&&memById(g.memberId)?`<span class=\"mdot\" style=\"background:${memById(g.memberId).color}\"><\u002Fspan>`:''}<\u002Fdiv>`).join(''):'<div class=\"empty\">Niciun obiectiv setat pentru această lună.<\u002Fdiv>');\n  LI();\n}\n\n/* ---------- YEAR ---------- */\nfunction mvYear(d){VY+=d;rYear();}\nfunction rYear(){\n  document.getElementById('yTitle').textContent=VY;\n  const tds=todayStr();let out='';\n  for(let m=0;m<12;m++){\n    const first=new Date(VY,m,1),nd=new Date(VY,m+1,0).getDate(),off=(first.getDay()+6)%7;\n    let t='<table><tr>'+['L','M','M','J','V','S','D'].map(x=>'<th>'+x+'<\u002Fth>').join('')+'<\u002Ftr><tr>';\n    for(let i=0;i<off;i++)t+='<td><\u002Ftd>';\n    for(let d=1;d<=nd;d++){\n      const ds=VY+'-'+pad(m+1)+'-'+pad(d);\n      const cls=ds===tds?'td':(eventsOn(ds).length?'ev':'');\n      t+=`<td class=\"${cls}\">${d}<\u002Ftd>`;\n      if((off+d)%7===0)t+='<\u002Ftr><tr>';\n    }\n    t+='<\u002Ftr><\u002Ftable>';\n    out+=`<div class=\"ymini\" onclick=\"VM={y:${VY},m:${m}};go('month')\"><h4>${MONTHS[m]}<\u002Fh4>${t}<\u002Fdiv>`;\n  }\n  document.getElementById('yGrid').innerHTML=out;\n}\n\n/* ---------- DAY ---------- */\nfunction mvDay(n){const d=fromStr(VD.d);d.setDate(d.getDate()+n);VD.d=dstr(d);rDay();}\nfunction dToday(){VD.d=todayStr();rDay();}\nfunction rDay(){\n  const d=fromStr(VD.d);\n  document.getElementById('dTitle').textContent=DAYS[d.getDay()]+', '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();\n  const df=document.getElementById('dFilter');if(df)df.innerHTML=filterBar();\n  const evs=eventsOn(VD.d).filter(evVisible);\n  document.getElementById('dList').innerHTML=evs.length?evs.map(e=>{\n    const c=(CATS[e.cat]||CATS.altele);\n    const who=(e.members||[]).map(id=>{const m=memById(id);return m?`<span class=\"mdot\" style=\"background:${m.color}\" title=\"${esc(m.name)}\"><\u002Fspan>`:'';}).join('');\n    const rec=e.recur&&e.recur.f!=='none'?'<i data-lucide=\"repeat\" class=\"ci\" style=\"color:var(--muted)\"><\u002Fi>':'';\n    return `<div class=\"evrow${e.doneOn&&e.doneOn.includes(VD.d)?' done':''}\" onclick=\"openEvent('${e.id}')\">\n      <input type=\"checkbox\" ${e.doneOn&&e.doneOn.includes(VD.d)?'checked':''} onclick=\"event.stopPropagation();tglDone('${e.id}')\" style=\"width:19px;height:19px;accent-color:var(--pri);margin-top:2px\">\n      <div class=\"cat\" style=\"background:${evColor(e)}\"><\u002Fdiv>\n      <div class=\"time\">${e.time||'—'}<\u002Fdiv>\n      <div class=\"grow\"><div class=\"t\"><i data-lucide=\"${c.i}\" class=\"ci\" style=\"color:${c.c}\"><\u002Fi>${esc(e.title)}${rec}<\u002Fdiv><div class=\"sub\">${c.n}${e.dur?' · '+e.dur+' min':''}${e.notes?' · '+esc(e.notes):''} ${who}<\u002Fdiv><\u002Fdiv>\n      <button class=\"evx\" title=\"Șterge\" onclick=\"event.stopPropagation();quickDelEvent('${e.id}')\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>`;\n  }).join(''):'<div class=\"empty\">Nimic planificat. Zi liberă!<\u002Fdiv>';\n  LI();\n}\nfunction tglDone(id){const e=S.events.find(x=>x.id===id);if(!e)return;e.doneOn=e.doneOn||[];const i=e.doneOn.indexOf(VD.d);i>=0?e.doneOn.splice(i,1):e.doneOn.push(VD.d);e.u=Date.now();save();rDay();}\nfunction quickDelEvent(id){\n  const e=S.events.find(x=>x.id===id);if(!e)return;\n  if(e.recur&&e.recur.f&&e.recur.f!=='none'){if(!confirm('„'+e.title+'\" se repetă. Ștergi toată seria?'))return;}\n  S.events=S.events.filter(x=>x.id!==id);tombstone(id);save();rDay();toast('Șters');\n}\n\n/* ---------- EVENT modal ---------- */\nlet EID=null;\nfunction openEvent(id,date){\n  EID=id||null;const e=id?S.events.find(x=>x.id===id):null;\n  document.getElementById('evTitle').textContent=e?'Editează activitatea':'Activitate nouă';\n  document.getElementById('eT').value=e?e.title:'';\n  document.getElementById('eD').value=e?e.date:(date||(VIEW==='month'?dstr(new Date(VM.y,VM.m,Math.min(new Date().getDate(),new Date(VM.y,VM.m+1,0).getDate()))):todayStr()));\n  document.getElementById('eH').value=e?(e.time||''):'';\n  document.getElementById('eDur').value=e?(e.dur||60):60;\n  document.getElementById('eRf').value=e&&e.recur?e.recur.f:'none';\n  document.getElementById('eRi').value=e&&e.recur?(e.recur.int||1):1;\n  document.getElementById('eRu').value=e&&e.recur?(e.recur.until||''):'';\n  document.getElementById('eN').value=e?(e.notify!=null?String(e.notify):''):(typeof defNotify==='function'&&defNotify()!=null?String(defNotify()):'');\n  document.getElementById('eNo').value=e?(e.notes||''):'';\n  const cat=e?e.cat:'familie';\n  document.getElementById('eCats').innerHTML=Object.entries(CATS).map(([k,v])=>`<button class=\"chip${k===cat?' on':''}\" data-c=\"${k}\" onclick=\"selCat(this)\"><i data-lucide=\"${v.i}\" style=\"color:${v.c}\"><\u002Fi>${v.n}<\u002Fbutton>`).join('');\n  const mems=e?(e.members||[]):S.members.map(m=>m.id);\n  document.getElementById('eMems').innerHTML=S.members.map(m=>`<button class=\"chip${mems.includes(m.id)?' on':''}\" data-m=\"${m.id}\" onclick=\"this.classList.toggle('on')\" style=\"${mems.includes(m.id)?'border-color:'+m.color:''}\">${avatar(m,'avs')} ${esc(m.name)}<\u002Fbutton>`).join('');\n  const mr=document.getElementById('eMailRow');\n  if(mr)mr.style.display=(typeof pushReady==='function'&&pushReady()&&pushOn('family',true))?'flex':'none';\n  document.getElementById('eMail').checked=e?(e.mailNotify!==false):true;\n  document.getElementById('eDel').style.display=e?'':'none';\n  document.getElementById('eIcsBtn').style.display=e?'':'none';\n  document.getElementById('evBack').classList.add('show');\n  LI();\n}\nfunction selCat(b){document.querySelectorAll('#eCats .chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');}\nfunction closeEvent(){document.getElementById('evBack').classList.remove('show');}\nfunction saveEvent(){\n  const t=document.getElementById('eT').value.trim();if(!t)return toast('Scrie un titlu');\n  const isNew=!EID;\n  const ev=EID?S.events.find(x=>x.id===EID):{id:uid()};\n  ev.title=t;ev.date=document.getElementById('eD').value||todayStr();ev.time=document.getElementById('eH').value;\n  ev.dur=Number(document.getElementById('eDur').value)||60;\n  ev.cat=(document.querySelector('#eCats .chip.on')||{}).dataset?.c||'familie';\n  ev.members=[...document.querySelectorAll('#eMems .chip.on')].map(b=>b.dataset.m);\n  const rf=document.getElementById('eRf').value;\n  ev.recur=rf==='none'?{f:'none'}:{f:rf,int:Number(document.getElementById('eRi').value)||1,until:document.getElementById('eRu').value||''};\n  const n=document.getElementById('eN').value;ev.notify=n===''?null:Number(n);\n  ev.notes=document.getElementById('eNo').value.trim();\n  ev.mailNotify=!!document.getElementById('eMail').checked;\n  ev.u=Date.now();\n  if(!EID)S.events.push(ev);\n  save();if(typeof pushOnEventChange==='function')pushOnEventChange(ev,isNew);closeEvent();render();toast('Salvat ✓');\n}\nfunction delEvent(){if(!EID)return;if(!confirm('Ștergi această activitate (inclusiv repetările)?'))return;S.events=S.events.filter(x=>x.id!==EID);tombstone(EID);if(typeof pushQueue==='function'&&typeof pushReady==='function'&&pushReady())pushQueue({action:'schedule',groups:[{prefix:'ev_'+EID+'_',items:[]}]});save();closeEvent();render();toast('Șters');}\n<\u002Fscript>\n<script>\n/* ---------- GOALS ---------- */\nfunction rGoals(){\n  document.getElementById('gTabM').classList.toggle('on',gScope==='m');\n  document.getElementById('gTabY').classList.toggle('on',gScope==='y');\n  const n=new Date();const k=gScope==='m'?(n.getFullYear()+'-'+pad(n.getMonth()+1)):String(n.getFullYear());\n  const gs=S.goals.filter(g=>g.ym===k);\n  const done=gs.filter(g=>g.done).length;\n  document.getElementById('gBar').style.width=(gs.length?Math.round(done/gs.length*100):0)+'%';\n  document.getElementById('gList').innerHTML=gs.length?gs.map(g=>{\n    const m=g.memberId?memById(g.memberId):null;\n    return `<div class=\"goal${g.done?' done':''}\"><input type=\"checkbox\" ${g.done?'checked':''} onchange=\"tglGoal('${g.id}')\"><span class=\"grow\">${esc(g.title)}<\u002Fspan>${m?`<span class=\"pill\" style=\"background:${m.color}22;color:${m.color}\">${esc(m.name)}<\u002Fspan>`:''}<button class=\"btn sm warn\" onclick=\"delGoal('${g.id}')\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>`;\n  }).join(''):'<div class=\"empty\">Adaugă primul obiectiv.<\u002Fdiv>';\n  const sel=document.getElementById('gWho');\n  sel.innerHTML='<option value=\"\">Toată familia<\u002Foption>'+S.members.map(m=>`<option value=\"${m.id}\">${esc(m.name)}<\u002Foption>`).join('');\n  LI();\n}\nfunction addGoal(){const t=document.getElementById('gNew').value.trim();if(!t)return;const n=new Date();const k=gScope==='m'?(n.getFullYear()+'-'+pad(n.getMonth()+1)):String(n.getFullYear());S.goals.push({id:uid(),title:t,ym:k,done:false,memberId:document.getElementById('gWho').value||null});document.getElementById('gNew').value='';save();rGoals();}\nfunction tglGoal(id){const g=S.goals.find(x=>x.id===id);if(g){g.done=!g.done;save();}if(VIEW==='goals')rGoals();else rMonth();}\nfunction delGoal(id){S.goals=S.goals.filter(x=>x.id!==id);tombstone(id);save();rGoals();}\n\n/* ---------- ICS export ---------- */\nfunction icsDate(ds,t){return ds.replace(/-/g,'')+(t?'T'+t.replace(':','')+'00':'');}\nfunction icsRule(e){\n  if(!e.recur||e.recur.f==='none')return '';\n  const F={d:'DAILY',w:'WEEKLY',m:'MONTHLY',y:'YEARLY'}[e.recur.f];\n  let r='RRULE:FREQ='+F+';INTERVAL='+(e.recur.int||1);\n  if(e.recur.until)r+=';UNTIL='+e.recur.until.replace(/-/g,'')+'T235959Z';\n  return r+'\\r\\n';\n}\nfunction icsBody(evs){\n  let s='BEGIN:VCALENDAR\\r\\nVERSION:2.0\\r\\nPRODID:-//FamLink//RO\\r\\nCALSCALE:GREGORIAN\\r\\nX-WR-CALNAME:FamLink — Calendarul Familiei\\r\\n';\n  evs.forEach(e=>{\n    const t=e.time||'09:00';\n    const end=new Date(fromStr(e.date));const[hh,mm]=t.split(':').map(Number);end.setHours(hh,mm+(e.dur||60));\n    s+='BEGIN:VEVENT\\r\\nUID:'+e.id+'@famlink\\r\\nDTSTAMP:'+icsDate(todayStr(),'00:00').replace(/-/g,'')+'Z\\r\\n';\n    if(e.time){s+='DTSTART:'+icsDate(e.date,t)+'\\r\\nDTEND:'+icsDate(dstr(end),pad(end.getHours())+':'+pad(end.getMinutes()))+'\\r\\n';}\n    else{s+='DTSTART;VALUE=DATE:'+e.date.replace(/-/g,'')+'\\r\\n';}\n    s+=icsRule(e);\n    s+='SUMMARY:'+e.title.replace(/([,;\\\\])/g,'\\\\$1')+'\\r\\n';\n    if(e.notes)s+='DESCRIPTION:'+e.notes.replace(/([,;\\\\])/g,'\\\\$1')+'\\r\\n';\n    if(e.notify!=null)s+='BEGIN:VALARM\\r\\nACTION:DISPLAY\\r\\nDESCRIPTION:'+e.title+'\\r\\nTRIGGER:-PT'+e.notify+'M\\r\\nEND:VALARM\\r\\n';\n    s+='END:VEVENT\\r\\n';\n  });\n  return s+'END:VCALENDAR\\r\\n';\n}\n/* --- selecție categorii pentru export (persistată în setări; implicit toate) --- */\nfunction icsSel(){const v=S.settings.icsCats;return (Array.isArray(v)&&v.length)?v.filter(k=>CATS[k]):Object.keys(CATS);}\nfunction rIcsCats(){\n  const box=document.getElementById('icsCats');if(!box)return;\n  const sel=icsSel();\n  box.innerHTML=Object.entries(CATS).map(([k,v])=>`<button class=\"chip${sel.includes(k)?' on':''}\" onclick=\"tglIcsCat('${k}')\"><i data-lucide=\"${v.i}\" style=\"color:${v.c}\"><\u002Fi>${v.n}<\u002Fbutton>`).join('');\n  LI();\n}\nfunction tglIcsCat(k){\n  let sel=icsSel().slice();\n  if(sel.includes(k)){if(sel.length===1)return toast('Lasă cel puțin o categorie');sel=sel.filter(x=>x!==k);}\n  else sel.push(k);\n  S.settings.icsCats=sel;save();rIcsCats();\n}\nfunction icsEvents(scope){\n  const sel=icsSel();\n  let evs;\n  if(scope==='all')evs=S.events;\n  else{const p=ymKey();evs=S.events.filter(e=>{const nd=new Date(VM.y,VM.m+1,0).getDate();for(let d=1;d<=nd;d++){if(occursOn(e,p+'-'+pad(d)))return true;}return false;});}\n  return evs.filter(e=>sel.includes(e.cat||'familie'));\n}\nfunction dl(name,content,type){const b=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);}\nfunction exportICS(scope){const evs=icsEvents(scope);if(!evs.length)return toast('Nimic de exportat — verifică și categoriile bifate în Setări → Export calendar');dl('FamLink_'+(scope==='all'?'tot':ymKey())+'.ics',icsBody(evs),'text/calendar');toast('Fișier .ics descărcat — deschide-l pe iPhone pentru import');}\nasync function shareICS(){\n  const evs=icsEvents('all');if(!evs.length)return toast('Nimic de trimis — verifică și categoriile bifate în Setări → Export calendar');\n  const f=new File([icsBody(evs)],'FamLink.ics',{type:'text/calendar'});\n  if(navigator.canShare&&navigator.canShare({files:[f]})){try{await navigator.share({files:[f],title:'FamLink — Calendarul Familiei'});return;}catch(e){}}\n  const emails=S.members.map(m=>m.email).filter(Boolean).join(',');\n  dl('FamLink.ics',icsBody(evs),'text/calendar');\n  location.href='mailto:'+emails+'?subject='+encodeURIComponent('Calendarul familiei — FamLink')+'&body='+encodeURIComponent('Salut!\\n\\nAtașează fișierul FamLink.ics descărcat adineauri și trimite-l — deschis pe iPhone, se importă direct în Calendar.\\n\\nSpor!');\n}\nfunction icsOne(){const e=S.events.find(x=>x.id===EID);if(e){dl('FamLink_'+e.title.replace(/\\W+/g,'_')+'.ics',icsBody([e]),'text/calendar');toast('.ics descărcat');}}\n\n/* ---------- PRINT month ---------- */\nfunction applyPage(){document.getElementById('pageStyle').textContent='@page{size:'+(S.settings.printSize||'A4')+' landscape;margin:9mm}';}\n/* culoare pe participanți: comun (2+ / familie) = verde app, individual = culoarea membrului */\nconst PCOMMON='#4e8d78';\nfunction pWhoColor(e){const ms=(e.members||[]).filter(id=>memById(id));return ms.length===1?memById(ms[0]).color:PCOMMON;}\n/* ---------- Modal zi (click pe o zi din calendar) ---------- */\nfunction openDayModal(ds){\n  VD.d=ds;const d=fromStr(ds);\n  const dn=DAYS[d.getDay()];\n  document.getElementById('dayModalTitle').textContent=dn.charAt(0).toUpperCase()+dn.slice(1)+', '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();\n  const evs=eventsOn(ds).filter(evVisible);\n  document.getElementById('dayModalList').innerHTML=evs.length?evs.map(e=>{\n    const c=(CATS[e.cat]||CATS.altele);\n    const who=(e.members||[]).map(id=>{const m=memById(id);return m?`<span class=\"mdot\" style=\"background:${m.color}\" title=\"${esc(m.name)}\"><\u002Fspan>`:'';}).join('');\n    return `<div class=\"evrow\" onclick=\"closeDayModal();openEvent('${e.id}')\"><div class=\"cat\" style=\"background:${evColor(e)}\"><\u002Fdiv><div class=\"time\">${e.time||'—'}<\u002Fdiv><div class=\"grow\"><div class=\"t\"><i data-lucide=\"${c.i}\" class=\"ci\" style=\"color:${c.c}\"><\u002Fi>${esc(e.title)}<\u002Fdiv><div class=\"sub\">${c.n}${e.dur?' · '+e.dur+' min':''} ${who}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n  }).join(''):'<div class=\"empty\">Nimic planificat în această zi.<\u002Fdiv>';\n  document.getElementById('dayBack').classList.add('show');LI();\n}\nfunction closeDayModal(){document.getElementById('dayBack').classList.remove('show');}\n\n/* ---------- Export PDF (landscape, pagină plină, fără antet de browser) ---------- */\n/* --- opțiuni „ce apare pe PDF\": categorii persistate + ascunderea activităților repetate zilnic --- */\nfunction pdfSel(){const v=S.settings.pdfCats;return (Array.isArray(v)&&v.length)?v.filter(k=>CATS[k]):Object.keys(CATS);}\nfunction pdfEvVisible(e){\n  if(!pdfSel().includes(e.cat||'familie'))return false;\n  if(S.settings.pdfSkipDaily&&e.recur&&e.recur.f==='d'){\n    /* păstrează evenimentele pe câteva zile (congres 12–14 etc.), ascunde doar repetițiile zilnice lungi/nesfârșite */\n    const span=e.recur.until?((fromStr(e.recur.until)-fromStr(e.date))/864e5):Infinity;\n    if(span>10)return false;\n  }\n  return true;\n}\nfunction pdfMonthEvents(){\n  const p=ymKey(),nd=new Date(VM.y,VM.m+1,0).getDate();\n  return S.events.filter(e=>{if(!pdfEvVisible(e))return false;for(let d=1;d<=nd;d++){if(occursOn(e,p+'-'+pad(d)))return true;}return false;});\n}\nfunction rPdfModal(){\n  const sel=pdfSel();\n  document.getElementById('pdfCats').innerHTML=Object.entries(CATS).map(([k,v])=>`<button class=\"chip${sel.includes(k)?' on':''}\" onclick=\"tglPdfCat('${k}')\"><i data-lucide=\"${v.i}\" style=\"color:${v.c}\"><\u002Fi>${v.n}<\u002Fbutton>`).join('');\n  document.getElementById('pdfSkipDaily').checked=!!S.settings.pdfSkipDaily;\n  const n=pdfMonthEvents().length;\n  const t=n===0?'nu va apărea nicio activitate — bifează mai multe categorii':(n===1?'va apărea <b>o<\u002Fb> activitate':('vor apărea <b>'+n+'<\u002Fb>'+(n<20?' activități':' de activități')));\n  document.getElementById('pdfCount').innerHTML='Pe pagina „'+MONTHS[VM.m]+' '+VM.y+'” '+t+'.';\n  LI();\n}\nfunction tglPdfCat(k){\n  let sel=pdfSel().slice();\n  if(sel.includes(k)){if(sel.length===1)return toast('Lasă cel puțin o categorie');sel=sel.filter(x=>x!==k);}\n  else sel.push(k);\n  S.settings.pdfCats=sel;save();rPdfModal();\n}\nfunction savePDF(){rPdfModal();document.getElementById('pdfBack').classList.add('show');LI();}\nfunction closePdfModal(){document.getElementById('pdfBack').classList.remove('show');}\nfunction buildPdfHTML(){\n  const first=new Date(VM.y,VM.m,1),start=new Date(first);start.setDate(1-((first.getDay()+6)%7));\n  const motto=S.mottos[ymKey()],tds=todayStr();\n  let weeks=0;for(let w=0;w<6;w++){const d=new Date(start);d.setDate(start.getDate()+w*7);if(w>=4&&d.getMonth()!==VM.m)break;weeks++;}\n  const W=1123,H=794,PAD=20,bandH=62,footH=28,gap=6;\n  const tableH=H-PAD*2-bandH-footH-gap*2;\n  const rowH=Math.floor(tableH/weeks);\n  const days=['Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă','Duminică'];\n  const head=days.map(d=>`<th style=\"background:#4e8d78;color:#fff;padding:6px 4px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-radius:5px\">${d}<\u002Fth>`).join('');\n  let rows='';\n  for(let w=0;w<weeks;w++){\n    let tr='<tr>';\n    for(let i=0;i<7;i++){\n      const d=new Date(start);d.setDate(start.getDate()+w*7+i);\n      const ds=dstr(d),out=d.getMonth()!==VM.m,wknd=i>=5;\n      const evs=out?[]:eventsOn(ds).filter(pdfEvVisible);\n      const bg=out?'#f7f7f7':(ds===tds?'#eef7f0':(wknd?'#f3f8f5':'#fff'));\n      const bd=ds===tds?'#4e8d78':(out?'#e8e8e8':'#d6e5de');\n      const numC=out?'#c6c6c6':'#3c7563';\n      const pills=evs.map(e=>{const who=evColor(e),cat=(CATS[e.cat]||CATS.altele).c;return `<div style=\"margin-top:3px;padding:2px 5px;border-radius:5px;color:#fff;font-weight:600;font-size:10.5px;line-height:1.25;background:${who};word-break:break-word;overflow-wrap:anywhere\"><span style=\"display:inline-block;width:6px;height:6px;border-radius:50%;background:${cat};box-shadow:0 0 0 1px rgba(255,255,255,.75);margin-right:4px;vertical-align:1px\"><\u002Fspan>${e.time?e.time+' ':''}${esc(e.title)}<\u002Fdiv>`;}).join('');\n      tr+=`<td style=\"border:${ds===tds?'2px':'1px'} solid ${bd};background:${bg};vertical-align:top;padding:5px;height:${rowH}px;border-radius:6px;overflow:hidden\"><div style=\"font-weight:800;font-size:14px;color:${numC}\">${d.getDate()}<\u002Fdiv>${pills}<\u002Ftd>`;\n    }\n    rows+=tr+'<\u002Ftr>';\n  }\n  const monthEvs=pdfMonthEvents();\n  const usedCats=[...new Set(monthEvs.map(e=>e.cat||'altele'))];\n  const hasCommon=monthEvs.some(e=>(e.members||[]).filter(id=>memById(id)).length!==1);\n  const usedMems=S.members.filter(m=>monthEvs.some(e=>(e.members||[]).filter(id=>memById(id)).length===1&&(e.members||[])[0]===m.id));\n  const sw=(c,rnd)=>`<span style=\"display:inline-block;width:11px;height:11px;border-radius:${rnd?'50%':'3px'};background:${c};vertical-align:-1px;margin:0 4px 0 10px\"><\u002Fspan>`;\n  const persLeg=(hasCommon||usedMems.length)?`<span><b style=\"color:#3c7563\">Persoane:<\u002Fb>${hasCommon?sw('#16a37f',1)+'Comun':''}${usedMems.map(m=>sw
