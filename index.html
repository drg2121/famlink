btn=document.getElementById('askMic');if(btn)btn.classList.remove('rec');\n  if(mode==='cancel')return;\n  let txt=(_voFinal||'').trim();\n  if(!txt){const s=(document.getElementById('voTxt').textContent||'').trim();if(s&&!/^Spune-mi|^…$|^Nu am putut/.test(s))txt=s;}\n  if(!txt||txt.length<2)return toast('Nu am auzit nimic');\n  const p=document.getElementById('askPanel');if(p&&!p.classList.contains('show'))toggleAsk();\n  const inp=document.getElementById('askInput');if(inp)inp.value=txt;\n  if(typeof askBarSync==='function')askBarSync();\n  if(mode==='add')askSend();\n  else if(inp){inp.focus();toast('Poți edita, apoi trimite');}\n}\n\n/* ---------- Selector utilizator ---------- */\nfunction askUser(force){\n  if(S.members.length<=1){S.settings.activeUser=S.members[0].id;save();if(force)toast('Ai un singur membru. Adaugă altul din Familie.');return;}\n  const pick=document.getElementById('userPick');\n  pick.innerHTML=S.members.map(m=>`<button class=\"chip${m.id===S.settings.activeUser?' on':''}\" style=\"justify-content:flex-start;padding:11px 14px;font-size:15px\" onclick=\"pickUser('${m.id}')\">${avatar(m,'av')} ${esc(m.name)}<\u002Fbutton>`).join('');\n  document.getElementById('userBack').classList.add('show');\n  LI();\n}\nfunction pickUser(id){\n  S.settings.activeUser=id;save();\n  if(typeof pushCronSync==='function')pushCronSync();\n  const sel=document.getElementById('dietWho');if(sel)sel.value=id;\n  document.getElementById('userBack').classList.remove('show');\n  const m=memById(id);toast('Bună, '+(m?m.name:'')+'!');\n  render();\n}\n\n/* ============ SINCRONIZARE PRIVATĂ (gist criptat) ============ */\nconst SKEY='famlink_sync';\nlet SYNC=(function(){try{return JSON.parse(localStorage.getItem(SKEY))||{}}catch(e){return {}}})();\nfunction saveSync(){localStorage.setItem(SKEY,JSON.stringify(SYNC));}\nfunction ghHeaders(){return {'Authorization':'token '+SYNC.token,'Accept':'application/vnd.github+json','Content-Type':'application/json'};}\nfunction b64enc(bytes){let s='';const ch=0x8000;for(let i=0;i<bytes.length;i+=ch)s+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch));return btoa(s);}\nasync function _key(pass,salt){const enc=new TextEncoder();const km=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:120000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}\nasync function encJSON(obj,pass){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));const key=await _key(pass,salt);const ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj))));const buf=new Uint8Array(28+ct.length);buf.set(salt,0);buf.set(iv,16);buf.set(ct,28);return b64enc(buf);}\nasync function decJSON(b64,pass){const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);const key=await _key(pass,salt);const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);return JSON.parse(new TextDecoder().decode(pt));}\nlet _pushT=null;\nfunction schedulePush(){if(!(SYNC.token&&SYNC.pass&&SYNC.gistId&&SYNC.auto!==false))return;clearTimeout(_pushT);_pushT=setTimeout(()=>syncPush(true),700);}\nasync function syncPush(silent){\n  if(!(SYNC.token&&SYNC.pass&&SYNC.gistId))return silent?0:toast('Conectează-te mai întâi');\n  const hb=document.getElementById('hSync');if(hb)hb.classList.add('spin');\n  try{\n    const content=await encJSON(S,SYNC.pass);\n    const r=await fetch('https://api.github.com/gists/'+SYNC.gistId,{method:'PATCH',headers:ghHeaders(),body:JSON.stringify({files:{'famlink-sync.json':{content}}})});\n    if(!r.ok)throw new Error('HTTP '+r.status);\n    SYNC.last=new Date().toISOString();saveSync();rSyncUI();if(!silent)toast('Salvat în cloud ✓');\n  }catch(e){if(!silent)toast('Sync eșuat: '+e.message);}\n  finally{if(hb)setTimeout(()=>hb.classList.remove('spin'),400);}\n}\n/* ---------- Notificări în aplicație ---------- */\nconst NKEY='famlink_notifs';\nlet NOTIFS=(function(){try{return JSON.parse(localStorage.getItem(NKEY))||[]}catch(e){return[]}})();\nfunction saveNotifs(){NOTIFS=NOTIFS.slice(0,50);localStorage.setItem(NKEY,JSON.stringify(NOTIFS));}\nfunction addNotif(text){NOTIFS.unshift({id:uid(),text,ts:Date.now(),read:false});saveNotifs();renderNotifBadge();try{notify('FamLink',text);}catch(e){}}\nfunction renderNotifBadge(){const b=document.getElementById('notifBadge');if(!b)return;const n=NOTIFS.filter(x=>!x.read).length;b.textContent=n>9?'9+':n;b.style.display=n?'':'none';}\nfunction renderNotifList(){document.getElementById('notifList').innerHTML=NOTIFS.length?NOTIFS.map(x=>`<div class=\"notifitem\"><div>${esc(x.text)}<\u002Fdiv><div class=\"muted\" style=\"font-size:11px;margin-top:2px\">${new Date(x.ts).toLocaleString('ro-RO')}<\u002Fdiv><\u002Fdiv>`).join(''):'<div class=\"empty\">Nicio notificare încă.<\u002Fdiv>';LI();}\nfunction toggleNotifPanel(){const p=document.getElementById('notifPanel');const open=p.classList.toggle('show');if(open){renderNotifList();NOTIFS.forEach(x=>x.read=true);saveNotifs();renderNotifBadge();}}\nfunction clearNotifs(){NOTIFS=[];saveNotifs();renderNotifBadge();renderNotifList();}\nfunction notifyNewEvents(beforeIds){\n  const au=S.settings.activeUser||S.members[0].id;\n  S.events.forEach(e=>{\n    if(beforeIds.has(e.id))return;\n    const ms=(e.members||[]).filter(id=>memById(id));\n    const isCommon=ms.length!==1;           // 0 sau 2+ membri = familie/comun\n    const includesMe=ms.includes(au);\n    if(isCommon||includesMe){\n      addNotif('Activitate nouă '+(isCommon?'(familie)':'(pentru tine)')+': '+e.title+' — '+e.date+(e.time?' '+e.time:''));\n    }\n  });\n}\n/* MERGE — combină local + remote fără să șteargă (ca ArhiLink): union pe id, nimic nu se pierde.\n   Per id câștigă înregistrarea cu amprenta de timp `u` mai NOUĂ (indiferent de dispozitiv) —\n   altfel copia veche de pe telefon suprascria editările făcute pe laptop (ex. emailul unui membru). */\nfunction mergeById(a,b){\n  const map={};\n  function put(x){if(!x||!x.id)return;const e=map[x.id];if(!e||((x.u||0)>=(e.u||0)))map[x.id]=x;}\n  (b||[]).forEach(put);(a||[]).forEach(put); /* localul (a) câștigă doar la egalitate de u */\n  return Object.values(map);\n}\nfunction mergeTomb(a,b){const out=Object.assign({},b||{});for(const id in (a||{}))out[id]=Math.max(out[id]||0,a[id]);return out;}\nfunction applyTomb(arr,tomb){return (arr||[]).filter(x=>{const t=(tomb||{})[x.id];if(!t)return true;return (x.u||0)>t;});}\nfunction mergeWeights(a,b){const out={};const mids=new Set([...Object.keys(a||{}),...Object.keys(b||{})]);mids.forEach(mid=>{const map={};(((b||{})[mid])||[]).forEach(w=>map[w.d]=w);(((a||{})[mid])||[]).forEach(w=>map[w.d]=w);out[mid]=Object.values(map).sort((x,y)=>x.d<y.d?-1:1);});return out;}\nfunction mergeWater(a,b){const out={};const mids=new Set([...Object.keys(a||{}),...Object.keys(b||{})]);mids.forEach(mid=>{out[mid]={};const days=new Set([...Object.keys((a||{})[mid]||{}),...Object.keys((b||{})[mid]||{})]);days.forEach(d=>{out[mid][d]=Math.max(((a||{})[mid]||{})[d]||0,((b||{})[mid]||{})[d]||0);});});return out;}\nfunction mergeState(local,remote){\n  const R=Object.assign(defState(),remote);R.diet=Object.assign(defState().diet,remote.diet||{});\n  const m=Object.assign(defState(),local);m.diet=Object.assign(defState().diet,local.diet||{});\n  m.tomb=mergeTomb(local.tomb,R.tomb);\n  m.events=applyTomb(mergeById(local.events,R.events),m.tomb);\n  m.goals=applyTomb(mergeById(local.goals,R.goals),m.tomb);\n  m.members=applyTomb(mergeById(local.members,R.members),m.tomb);\n  if(!m.members.length)m.members=(local.members&&local.members.length?local.members:defState().members);\n  m.mottos=Object.assign({},R.mottos||{},local.mottos||{});\n  m.diet.meals=applyTomb(mergeById(local.diet.meals,R.diet.meals),m.tomb);\n  m.diet.sports=applyTomb(mergeById(local.diet.sports,R.diet.sports),m.tomb);\n  m.diet.weights=mergeWeights(local.diet.weights,R.diet.weights);\n  m.diet.profiles=Object.assign({},R.diet.profiles||{},local.diet.profiles||{});\n  m.diet.water=mergeWater(local.diet.water,R.diet.water);\n  m.diet.fasting=local.diet.fasting; // cronometru specific dispozitivului\n  // setări: rămân locale, DAR cheia Gemini și modelul se propagă între dispozitive dacă lipsesc\n  m.settings=Object.assign({},local.settings);\n  const rs=R.settings||{};\n  if(!m.settings.geminiKey&&rs.geminiKey)m.settings.geminiKey=rs.geminiKey;\n  if(!m.settings.model&&rs.model)m.settings.model=rs.model;\n  // configurarea notificărilor pe email se propagă între dispozitive (câștigă cea mai nouă)\n  const lp=m.settings.push,rp=rs.push;\n  if(rp&&(!lp||((rp.u||0)>(lp.u||0))))m.settings.push=rp;\n  return m;\n}\nasync function syncPull(silent){\n  if(!(SYNC.token&&SYNC.pass&&SYNC.gistId))return silent?0:toast('Conectează-te mai întâi');\n  try{\n    const r=await fetch('https://api.github.com/gists/'+SYNC.gistId,{headers:ghHeaders()});\n    if(!r.ok)throw new Error('HTTP '+r.status);\n    const d=await r.json(),f=d.files&&d.files['famlink-sync.json'];\n    if(!f||!f.content)throw new Error('gist gol');\n    const obj=await decJSON(f.content,SYNC.pass);\n    if(obj&&obj.members){\n      const beforeIds=new Set(S.events.map(e=>e.id));\n      const firstTime=!SYNC.seeded;\n      S=mergeState(S,obj);localStorage.setItem(KEY,JSON.stringify(S));\n      if(!firstTime)notifyNewEvents(beforeIds);\n      SYNC.seeded=true;SYNC.last=new Date().toISOString();saveSync();rSyncUI();render();if(!silent)toast('Sincronizat ✓ (date combinate)');\n    }\n  }catch(e){if(!silent)toast(/operation-specific|decrypt/i.test(e.message)?'Parolă greșită de criptare':'Nu am putut încărca: '+e.message);}\n}\nlet _syncTimer=null;\nfunction setupSyncTimer(){clearInterval(_syncTimer);const mn=Number(SYNC.intervalMin);if(mn&&SYNC.token&&SYNC.pass&&SYNC.gistId)_syncTimer=setInterval(()=>syncPull(true),mn*60000);}\nfunction shareSyncAccess(){\n  if(!(SYNC.token&&SYNC.pass&&SYNC.gistId))return toast('Conectează întâi sincronizarea, apoi trimite accesul');\n  const payload=btoa(JSON.stringify({t:SYNC.token,g:SYNC.gistId,p:SYNC.pass}));\n  const link=location.origin+location.pathname+'#sync='+payload;\n  if(navigator.share){navigator.share({title:'FamLink — acces familie',text:'Deschide linkul ca să vezi calendarul familiei pe dispozitivul tău:',url:link}).catch(()=>{});}\n  else{(navigator.clipboard?navigator.clipboard.writeText(link):Promise.reject()).then(()=>toast('Link copiat — trimite-l familiei prin mesaj privat')).catch(()=>prompt('Copiază linkul și trimite-l familiei:',link));}\n}\nfunction importSyncFromHash(){\n  const h=location.hash||'';\n  if(h.indexOf('#sync=')!==0)return false;\n  let data=null;try{data=JSON.parse(atob(h.slice(6)));}catch(e){}\n  history.replaceState(null,'',location.pathname);\n  if(data&&data.t&&data.g&&data.p){\n    if(SYNC.token===data.t&&SYNC.gistId===data.g&&SYNC.pass===data.p)return false; /* deja conectat cu aceleași date — nu întreba nimic */\n    if(confirm('Te conectezi la calendarul familiei partajat? Datele tale de pe acest dispozitiv se vor combina cu cele partajate (nimic nu se șterge).')){\n      SYNC.token=data.t;SYNC.gistId=data.g;SYNC.pass=data.p;SYNC.auto=true;if(!SYNC.intervalMin)SYNC.intervalMin=5;saveSync();\n      syncPull(false).then(()=>{setupSyncTimer();rSyncUI();toast('Conectat la calendarul familiei ✓');});\n      return true;\n    }\n  }\n  return false;\n}\nfunction syncNow(){\n  const b=document.getElementById('hSync');\n  if(!(SYNC.token&&SYNC.pass&&SYNC.gistId)){toast('Activează sincronizarea în Setări');go('set');return;}\n  if(b)b.classList.add('spin');\n  syncPull().then(()=>syncPush(true)).finally(()=>{setTimeout(()=>{if(b)b.classList.remove('spin');},600);});\n}\nasync function syncConnect(){\n  const token=(document.getElementById('syncToken').value||'').trim();\n  const pass=document.getElementById('syncPass').value||'';\n  if(!token||!pass)return toast('Completează tokenul și parola de criptare');\n  SYNC.token=token;SYNC.pass=pass;SYNC.auto=true;toast('Mă conectez…');\n  try{\n    const lr=await fetch('https://api.github.com/gists?per_page=100',{headers:ghHeaders()});\n    if(!lr.ok)throw new Error(lr.status===401?'token invalid':'HTTP '+lr.status);\n    const list=await lr.json();\n    const found=Array.isArray(list)?list.find(g=>g.files&&g.files['famlink-sync.json']):null;\n    if(found){SYNC.gistId=found.id;saveSync();await syncPull(true);toast('Conectat — date încărcate ✓');}\n    else{\n      const content=await encJSON(S,pass);\n      const cr=await fetch('https://api.github.com/gists',{method:'POST',headers:ghHeaders(),body:JSON.stringify({description:'FamLink sync (criptat)',public:false,files:{'famlink-sync.json':{content}}})});\n      if(!cr.ok)throw new Error('creare eșuată ('+cr.status+')');\n      const d=await cr.json();SYNC.gistId=d.id;toast('Conectat — sync creat ✓');\n    }\n    if(!SYNC.intervalMin)SYNC.intervalMin=5;\n    SYNC.last=new Date().toISOString();saveSync();rSyncUI();setupSyncTimer();\n  }catch(e){toast('Eroare: '+e.message);}\n}\nfunction syncDisconnect(){if(!confirm('Te deconectezi? Datele rămân pe acest dispozitiv, dar nu se mai sincronizează.'))return;SYNC={};saveSync();const t=document.getElementById('syncToken'),p=document.getElementById('syncPass');if(t)t.value='';if(p)p.value='';rSyncUI();setupSyncTimer();toast('Deconectat');}\nfunction rSyncUI(){\n  const st=document.getElementById('syncStatus');if(!st)return;\n  const tI=document.getElementById('syncToken'),pI=document.getElementById('syncPass');\n  if(tI&&SYNC.token&&!tI.value)tI.value=SYNC.token;\n  if(pI&&SYNC.pass&&!pI.value)pI.value=SYNC.pass;\n  const eI=document.getElementById('syncEvery');if(eI)eI.value=String(SYNC.intervalMin||0);\n  st.innerHTML=(SYNC.token&&SYNC.gistId)?('<b style=\"color:var(--pri2)\">Conectat ✓<\u002Fb>'+(SYNC.last?(' · ultima sincronizare: '+new Date(SYNC.last).toLocaleString('ro-RO')):'')):'Neconectat — datele stau doar pe acest dispozitiv.';\n}\n\n/* ============ ASISTENT FLOTANT ============ */\nfunction toggleAsk(){const p=document.getElementById('askPanel');const open=p.classList.toggle('show');if(open){askWelcome();LI();setTimeout(()=>document.getElementById('askInput').focus(),60);}else{resetAsk();}}\n/* La închiderea sesiunii (X) uităm conversația — data viitoare pornește curat, nu continuă ce a fost. Ce e durabil rămâne în memoria de lungă durată. */\nfunction resetAsk(){_askHist=[];const log=document.getElementById('askLog');if(log){log.innerHTML='';delete log.dataset.init;}}\n/* Memorie de lungă durată: fapte durabile despre utilizator, păstrate între sesiuni în localStorage. */\nfunction rememberAI(facts){if(!Array.isArray(facts))return;const mem=S.settings.aiMemory=S.settings.aiMemory||[];facts.forEach(f=>{f=String(f||'').trim();if(f.length<3)return;if(mem.some(x=>x.toLowerCase()===f.toLowerCase()))return;mem.push(f);});if(mem.length>40)S.settings.aiMemory=mem.slice(-40);save();}\nfunction rAIMem(){const box=document.getElementById('aiMemBox');if(!box)return;const mem=S.settings.aiMemory||[];box.innerHTML='<label>Ce a reținut asistentul despre tine ('+mem.length+')<\u002Flabel>'+(mem.length?('<div>'+mem.map((m,i)=>'<div class=\"mealrow\"><span>'+esc(m)+'<\u002Fspan><button class=\"btn sm warn\" onclick=\"forgetAI('+i+')\" title=\"Uită\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>').join('')+'<\u002Fdiv><button class=\"btn sm ghost\" style=\"margin-top:8px\" onclick=\"forgetAI(-1)\"><i data-lucide=\"trash-2\"><\u002Fi>Șterge toată memoria<\u002Fbutton>'):'<p class=\"muted\" style=\"margin:4px 0 0\">Nimic reținut încă. Pe măsură ce vorbești cu asistentul, reține lucruri durabile despre tine (preferințe, familie, obiceiuri).<\u002Fp>');LI();}\nfunction forgetAI(i){const mem=S.settings.aiMemory=S.settings.aiMemory||[];if(i<0)S.settings.aiMemory=[];else mem.splice(i,1);save();rAIMem();toast('Memorie actualizată');}\n/* salut personalizat + sugestii rapide, o singură dată */\nfunction askWelcome(){\n  const log=document.getElementById('askLog');\n  if(log.dataset.init)return;log.dataset.init='1';\n  const h=new Date().getHours();\n  const sal=h<5?'Bună seara':h<12?'Neața':h<18?'Salut':'Bună seara';\n  const me=(memById(S.settings.activeUser||S.members[0].id)||{}).name||'';\n  appendAsk('bot',sal+(me&&me!=='Eu'?', '+me:'')+'! Spune-mi ce ai mâncat sau băut, pune ceva în calendar sau întreabă-mă orice despre ziua ta.');\n  const chips=document.createElement('div');chips.id='askChips';chips.className='askchips';\n  [['glass-water','Am băut un pahar de apă'],['flame','Câte calorii mai am azi?'],['calendar','Ce am mâine în calendar?'],['footprints','Am mers pe jos 30 de minute']].forEach(p=>{\n    const b=document.createElement('button');b.className='askchip';b.innerHTML='<i data-lucide=\"'+p[0]+'\"><\u002Fi>'+p[1];\n    b.onclick=()=>{document.getElementById('askInput').value=p[1];askSend();};\n    chips.appendChild(b);\n  });\n  log.appendChild(chips);LI();\n}\nfunction appendAsk(who,txt){\n  const log=document.getElementById('askLog');\n  let bubble;\n  if(who==='bot'){\n    const w=document.createElement('div');w.className='askbot';\n    w.innerHTML='<div class=\"mini\"><i data-lucide=\"sparkles\"><\u002Fi><\u002Fdiv>';\n    bubble=document.createElement('div');bubble.className='askmsg bot';bubble.textContent=txt;\n    w.appendChild(bubble);log.appendChild(w);LI();\n  }else{\n    bubble=document.createElement('div');bubble.className='askmsg user';bubble.textContent=txt;log.appendChild(bubble);\n  }\n  log.scrollTop=log.scrollHeight;return bubble;\n}\nfunction logWeightKg(kg){const mid=dietMid();S.diet.weights[mid]=S.diet.weights[mid]||[];const ws=S.diet.weights[mid],t=todayStr();const ex=ws.find(x=>x.d===t);if(ex)ex.w=kg;else ws.push({d:t,w:kg});ws.sort((a,b)=>a.d<b.d?-1:1);save();if(VIEW==='health')rDiet();}\nfunction setMottoCore(text){S.mottos[curYm()]=String(text||'').trim();save();rMotto();}\nfunction addGoalCore(title,scope){const n=new Date();const k=(/an|year/i.test(scope||''))?String(n.getFullYear()):(n.getFullYear()+'-'+pad(n.getMonth()+1));S.goals.push({id:uid(),title:String(title),ym:k,done:false,memberId:S.settings.activeUser||null});save();if(VIEW==='goals')rGoals();else if(VIEW==='month')rMonth();}\nfunction addReminderCore(label,time,every){S.settings.reminders=S.settings.reminders||[];const r={id:uid(),label:label||'Memento',on:true};if(Number(every))r.every=Number(every);else r.time=/^\\d{1,2}:\\d{2}$/.test(time||'')?time:'09:00';S.settings.reminders.push(r);save();if(VIEW==='set'||VIEW==='rem')rReminders();maybeAskNotif();if(typeof pushCronSync==='function')pushCronSync();}\nfunction _normRo(s){return String(s||'').toLowerCase().replace(/[ăâ]/g,'a').replace(/î/g,'i').replace(/[șş]/g,'s').replace(/[țţ]/g,'t').replace(/[^a-z0-9 ]/g,' ').replace(/\\s+/g,' ').trim();}\nfunction markEventDone(match){\n  const q=_normRo(match);if(!q)return null;\n  const nt=e=>_normRo(e.title);\n  let c=S.events.filter(e=>e.title&&(nt(e).includes(q)||q.includes(nt(e))));\n  if(!c.length){ // potrivire pe cuvinte, tolerantă la diacritice și flexiuni (ședință/ședința)\n    const qw=q.split(' ').filter(w=>w.length>2);\n    c=S.events.filter(e=>{const tw=nt(e).split(' ');return qw.some(w=>tw.some(t=>t.startsWith(w.slice(0,4))||w.startsWith(t.slice(0,4))));});\n  }\n  if(!c.length)return null;\n  const td=todayStr();\n  c.sort((a,b)=>Math.abs(fromStr(a.date||td)-fromStr(td))-Math.abs(fromStr(b.date||td)-fromStr(td)));\n  const e=c[0],d=/^\\d{4}-\\d{2}-\\d{2}$/.test(e.date||'')?e.date:td;\n  e.doneOn=e.doneOn||[];if(!e.doneOn.includes(d))e.doneOn.push(d);e.u=Date.now();\n  save();if(typeof render==='function')render();\n  return e.title;\n}\nfunction execAction(a){\n  switch(a.action){\n    case 'fasting_start': if(!S.diet.fasting.active)fastToggle(); break;\n    case 'fasting_stop': if(S.diet.fasting.active)fastToggle(); break;\n    case 'water': logWater(Number(a.ml)||250); break;\n    case 'drink': quickMeal(a.name||'Băutură',Number(a.cal)||0,a.type||'Gustare'); break;\n    case 'meal': quickMeal(a.name||'Masă',Number(a.cal)||0,a.type||'Gustare'); break;\n    case 'sport': logSport(a.name||'Sport',Number(a.minutes)||0,Number(a.cal)||0); break;\n    case 'weight': if(Number(a.kg))logWeightKg(Number(a.kg)); break;\n    case 'motto': if(a.text)setMottoCore(a.text); break;\n    case 'goal': if(a.name||a.text)addGoalCore(a.name||a.text,a.scope); break;\n    case 'reminder': addReminderCore(a.label||a.name,a.time,a.every); break;\n    case 'done': markEventDone(a.match||a.name||a.text||a.label); break;\n    default: break;\n  }\n}\nlet _askHist=[];\n/* rezumatul datelor reale ale utilizatorului — ca asistentul să răspundă concret, nu generic */\nfunction askCtx(){\n  const p=getProf(),w=lastW(),c=calc(p,w);\n  const meals=todayMeals();\n  const kcal=meals.reduce((s,m)=>s+(Number(m.cal)||0),0);\n  const mtxt=meals.map(m=>m.type+': '+m.name+' ('+m.cal+' kcal)').join('; ')||'nimic încă';\n  const t=todayStr();\n  const evs=S.events.filter(e=>e.date>=t).sort((a,b)=>a.date<b.date?-1:(a.time<b.time?-1:1)).slice(0,6).map(e=>e.date+(e.time?' '+e.time:'')+' — '+e.title).join('; ')||'niciuna';\n  const goals=S.goals.filter(g=>!g.done).slice(-5).map(g=>g.title).join('; ')||'niciunul';\n  const me=(memById(S.settings.activeUser||S.members[0].id)||{}).name||'utilizator';\n  const ws=(S.diet.weights[dietMid()]||[]).slice(-5).map(x=>x.d+': '+x.w+' kg').join(', ');\n  return `Utilizator: ${me}. Profil: ${p.sex==='F'?'femeie':'bărbat'}, ${p.age||'?'} ani, ${p.h||'?'} cm, ${w||'?'} kg, țintă ${p.target||'?'} kg${c?(', necesar zilnic '+c.target+' kcal (TDEE '+c.tdee+')'):''}.${ws?(' Ultimele cântăriri: '+ws+'.'):''} Azi a mâncat: ${mtxt} — total ${kcal} kcal. Apă azi: ${waterToday()} ml. Fasting activ: ${S.diet.fasting.active?'da':'nu'} (schemă ${S.diet.fasting.hours||16}:${24-(S.diet.fasting.hours||16)}). Următoarele activități din calendar: ${evs}. Obiective active: ${goals}.`;\n}\nasync function askSend(){\n  const inp=document.getElementById('askInput');const text=(inp.value||'').trim();\n  if(!text)return;\n  if(!S.settings.geminiKey){appendAsk('user',text);appendAsk('bot','Adaugă întâi cheia Gemini în Setări → Gemini AI.');inp.value='';return;}\n  const ch=document.getElementById('askChips');if(ch)ch.remove();\n  appendAsk('user',text);inp.value='';if(typeof askBarSync==='function')askBarSync();\n  const wait=appendAsk('bot','');\n  wait.innerHTML='<span class=\"typing\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>';\n  const hist=_askHist.slice(-10).map(h=>(h.who==='user'?'Utilizator':'Tu (asistentul)')+': '+h.txt).join('\\n')||'(început de conversație)';\n  _askHist.push({who:'user',txt:text});if(_askHist.length>30)_askHist=_askHist.slice(-30);\n  try{\n    const memTxt=(S.settings.aiMemory=S.settings.aiMemory||[]).join(' | ')||'(nimic reținut încă)';\n    const prompt=`Ești asistentul personal din aplicația FamLink (sănătate + calendar de familie). Vorbești în română, natural. Azi este ${DAYS[new Date().getDay()]}, ${todayStr()}, ora ${new Date().toTimeString().slice(0,5)}.\nDATELE REALE ALE UTILIZATORULUI (folosește-le ca să fii concret și precis): ${askCtx()}\nMEMORIE DE LUNGĂ DURATĂ (lucruri durabile pe care le știi deja despre el — preferințe, familie, obiceiuri, restricții; ține cont de ele): ${memTxt}\nCONVERSAȚIA DE PÂNĂ ACUM:\n${hist}\nMESAJUL NOU AL UTILIZATORULUI: \"${text}\"\nIMPORTANT: mesajul vine des prin DICTARE VOCALĂ, deci poate avea greșeli de scriere, gramatică, cuvinte lipite sau transcrise fonetic greșit. Înțelege ce a vrut să spună, corectează în minte și tratează-l ca și cum ar fi fost scris corect — nu-l certa pentru greșeli, iar când confirmi folosește exprimarea corectă. EXCEPȚIE FERMĂ: numele proprii, denumirile de firme/bănci/aplicații/produse și cuvintele străine (engleză) se păstrează EXACT cum apar — nu le înlocui cu cuvinte românești care sună asemănător și nu deduce altă activitate din ele; dacă un asemenea cuvânt e neclar și schimbă sensul, întreabă scurt în loc să ghicești.\nRăspunde DOAR cu JSON valid, fără markdown: {\"actions\":[{\"action\":\"fasting_start|fasting_stop|water|drink|meal|sport|weight|motto|goal|reminder|event|done\",\"ml\":număr,\"name\":\"\",\"cal\":număr,\"type\":\"Mic dejun|Prânz|Cină|Gustare\",\"minutes\":număr,\"kg\":număr,\"scope\":\"month|year\",\"label\":\"\",\"time\":\"HH:MM\",\"every\":ore,\"match\":\"\",\"text\":\"\"}],\"memory\":[\"fapt nou durabil de reținut\"],\"reply\":\"răspunsul tău\"}.\nReguli acțiuni: \"am băut apă/un pahar\"→water (pahar=250 ml, sticlă=500, cană=300); cafea/ceai/suc/bere→drink cu cal estimat (cafea simplă 2, cu lapte 60, suc 110, bere 150) și name; mâncare descrisă→meal cu cal estimat realist și type potrivit orei; \"am alergat/mers/sală/înot X minute\"→sport cu name și minutes; \"am/cântărit X kg\"→weight; motto→motto cu text; obiectiv→goal cu name și scope; DISTINCȚIE memento↔calendar (FOARTE IMPORTANT): dacă apare o ZI sau DATĂ anume (azi, mâine, poimâine, o zi a săptămânii ca „miercuri\", „pe 12\", un weekend, o dată clară) → e EVENIMENT DE CALENDAR: action=\"event\", text=comanda originală COMPLETĂ (păstrează ziua ȘI ora exact cum le-a spus, nu le scoate). Un memento (reminder) NU are dată calendaristică — e doar o notificare care se REPETĂ: „în fiecare zi la 9 ia pastila\", „amintește-mi seara să…\" → reminder cu label și time; „la fiecare 2 ore bea apă\" → reminder cu label și every=ore. Regulă fermă: o singură dată/zi anume ⇒ event (NU reminder, mementoul nu poate ține o dată); niciun reper de dată, doar un obicei repetat ⇒ reminder. TERMINAT/BIFARE: dacă utilizatorul spune că a TERMINAT sau a făcut deja o activitate EXISTENTĂ din calendar („am terminat X\", „gata cu X\", „am făcut deja X\", „bifează X\") → action=\"done\", match=cuvinte-cheie din numele activității; NU crea eveniment nou și NU o șterge — doar o marchezi ca terminată. Dacă mesajul conține mai multe lucruri, pune mai multe acțiuni în array. Dacă e doar o întrebare sau conversație (ex: \"câte calorii mai am azi?\", \"ce am mâine în calendar?\", \"ce să mănânc la cină?\") → \"actions\":[] și răspunzi din datele de mai sus.\nREGULĂ DE AUR: execută DOAR ce a cerut utilizatorul explicit, exact cum a cerut — nu adăuga acțiuni în plus, nu schimba cantități, ore sau tipuri din proprie inițiativă. Dacă mesajul e ambiguu sau nu ești sigur ce a vrut (ce acțiune, ce cantitate, ce oră) → \"actions\":[] și pune în reply o întrebare scurtă de clarificare, în loc să ghicești. În reply spune mereu EXACT ce ai notat (nume, cantitate, oră), ca utilizatorul să vadă imediat dacă ai înțeles greșit.\nMEMORIE — în \"memory\" pune DOAR informații durabile despre utilizator, care merită ținute minte pe termen lung (preferințe alimentare, alergii/intoleranțe, cine e în familie și detalii despre ei, obiective de fond, obiceiuri, cum îi place să-i vorbești). NU pune lucruri de moment (că a băut apă azi, caloriile de azi) — alea se salvează deja separat. Nu repeta ce e deja în MEMORIE. Dacă nu e nimic nou durabil, pune \"memory\":[].\nReguli pentru \"reply\" — cele mai importante: vorbește ca un om real, cald și direct, la persoana a doua, nu ca un robot și nu ca un raport. Fii PRECIS: folosește cifrele reale din date (kcal rămase = necesar zilnic minus total mâncat, apă, kilograme, ce urmează în calendar). La întrebări răspunde la obiect în 1-3 fraze; la acțiuni confirmă scurt și natural, eventual cu o observație utilă legată de datele lui. Ține cont de conversația de până acum (referiri la mesaje anterioare). Fără liste, fără markdown, fără formule de salut repetate, fără clișee motivaționale.`;\n    const raw=await gemini([{text:prompt}],{json:true,temp:0.5,model:'gemini-3.1-flash-lite',maxTokens:800});\n    const a=parseAIJson(raw);\n    if(a&&a.memory)rememberAI(a.memory);\n    const acts=Array.isArray(a.actions)?a.actions:(a.action?[a]:[]);\n    const done=msg=>{wait.textContent=msg;_askHist.push({who:'bot',txt:msg});};\n    const evAct=acts.find(x=>x&&x.action==='event');\n    acts.filter(x=>x&&x.action&&x.action!=='event'&&x.action!=='reply').forEach(execAction);\n    if(evAct){addEventsFromText(evAct.text||text,false,msg=>done(msg));return;}\n    done(a.reply||'Gata ✓');\n  }catch(e){wait.textContent='Nu am reușit: '+e.message;}\n}\nfunction askVoice(){voiceAdd();}\n/* Send apare doar când e text scris — microfonul rămâne butonul principal */\nfunction askBarSync(){const i=document.getElementById('askInput'),s=document.getElementById('askSendBtn');if(!i||!s)return;s.style.display=(i.value||'').trim()?'':'none';}\n\n/* ============ INIT ============ */\napplyPage();\ngo('month');\naskUser();\nrenderNotifBadge();\nconst _imported=importSyncFromHash();\nif(!_imported&&SYNC.token&&SYNC.pass&&SYNC.gistId&&SYNC.auto!==false)syncPull(true);\nsetupSyncTimer();\npushInit();\ntick();\nwindow.addEventListener('load',LI);\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
