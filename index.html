p.firstElementChild;\n    const canvas=await html2canvas(node,{scale:2,backgroundColor:'#ffffff',width:1123,height:794,windowWidth:1123,windowHeight:794});\n    const img=canvas.toDataURL('image/jpeg',0.96);\n    const a3=S.settings.printSize==='A3';\n    const {jsPDF}=window.jspdf;\n    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:a3?'a3':'a4'});\n    pdf.addImage(img,'JPEG',0,0,a3?420:297,a3?297:210,undefined,'FAST');\n    pdf.save('FamLink_'+ymKey()+'.pdf');\n    toast('PDF salvat ✓');\n  }catch(e){toast('Eroare PDF: '+e.message);}\n  finally{document.body.removeChild(wrap);}\n}\n\n/* ---------- NOTIFICATIONS ---------- */\nfunction askNotif(){\n  if(!('Notification' in window))return toast('Browserul nu suportă notificări');\n  Notification.requestPermission().then(p=>{rSet();toast(p==='granted'?'Notificări activate':'Notificări refuzate');});\n}\nfunction notify(title,body){\n  if('Notification' in window&&Notification.permission==='granted'){try{new Notification(title,{body,icon:undefined});}catch(e){}}\n  toast(title+' — '+body);\n}\nlet FIRED={};\nfunction tick(){\n  const now=new Date(),ds=todayStr();\n  // events\n  S.events.forEach(e=>{\n    if(e.notify==null||!e.time||!occursOn(e,ds))return;\n    const[k,mn]=e.time.split(':').map(Number);\n    const at=new Date();at.setHours(k,mn-e.notify,0,0);\n    const key=e.id+ds;\n    if(now>=at&&now-at<90000&&!FIRED[key]){FIRED[key]=1;notify('Calendar: '+e.title,(e.notify?('în '+(e.notify>=60?(e.notify/60)+' h':e.notify+' min')+' — '):'acum — ')+'la '+e.time);}\n  });\n  // fasting\n  const f=S.diet.fasting;\n  if(f.active&&f.start){\n    const el=(now-new Date(f.start))/36e5;\n    if(el>=f.hours&&!FIRED['fast'+f.start]){FIRED['fast'+f.start]=1;notify('Fasting complet!','Ai atins ținta de '+f.hours+' ore. Bravo! Poți mânca.');}\n  }\n  // mementouri\n  (S.settings.reminders||[]).forEach(r=>{\n    if(r.on===false)return;\n    if(r.every){\n      const h=now.getHours();\n      if(h<8||h>22)return;\n      if(h%r.every===0&&now.getMinutes()<1){const key='rem'+r.id+ds+h;if(!FIRED[key]){FIRED[key]=1;notify('⏰ '+r.label,'E momentul!');}}\n    }else if(r.time){\n      const[hh,mm]=r.time.split(':').map(Number);\n      const at=new Date();at.setHours(hh,mm,0,0);\n      const key='rem'+r.id+ds;\n      if(now>=at&&now-at<90000&&!FIRED[key]){FIRED[key]=1;notify('⏰ '+r.label,'E momentul!');}\n    }\n  });\n  if(VIEW==='health')fastPaint();\n}\nsetInterval(tick,30000);\n\n/* ---------- SETTINGS ---------- */\nfunction rSet(){\n  const au=S.settings.activeUser||S.members[0].id;\n  document.getElementById('memList').innerHTML=S.members.map(m=>{\n    const active=m.id===au;\n    return `<div class=\"memrow${active?' active':''}\">\n      ${avatar(m)}\n      <div class=\"grow\"><div class=\"nm\">${esc(m.name)}${active?'<span class=\"activepill\">activ<\u002Fspan>':''}<\u002Fdiv><div class=\"em\">${esc(m.email||'—')}<\u002Fdiv><\u002Fdiv>\n      <input type=\"color\" value=\"${m.color}\" title=\"Schimbă culoarea\" onchange=\"setMemberColor('${m.id}',this.value)\">\n      <button class=\"btn sm ghost\" onclick=\"openEditMember('${m.id}')\" title=\"Editează\"><i data-lucide=\"pencil\"><\u002Fi><\u002Fbutton>\n      ${active?'':`<button class=\"btn sm sec\" onclick=\"pickUser('${m.id}')\"><i data-lucide=\"check\"><\u002Fi>Folosește<\u002Fbutton>`}\n      <button class=\"btn sm warn\" onclick=\"delMember('${m.id}')\" title=\"Șterge\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>`;\n  }).join('');\n  document.getElementById('setKey').value=S.settings.geminiKey||'';\n  document.getElementById('setModel').value=S.settings.model||'gemini-2.0-flash';\n  if(typeof rAIMem==='function')rAIMem();\n  document.getElementById('setPrint').value=S.settings.printSize||'A4';\n  document.getElementById('setVoiceAuto').checked=S.settings.voiceAutoSend!==false;\n  document.getElementById('notifState').textContent=('Notification' in window)?({granted:'active',denied:'blocate ✕',default:'inactive'}[Notification.permission]):'nesuportate';\n  rReminders();\n  if(typeof rIcsCats==='function')rIcsCats();\n  if(typeof rSyncUI==='function')rSyncUI();\n  if(typeof rPushUI==='function')rPushUI();\n  LI();\n}\nfunction rReminders(){\n  const rs=S.settings.reminders||[];\n  document.getElementById('remList').innerHTML=rs.length?rs.map(r=>`<div class=\"mealrow\"><span style=\"display:inline-flex;align-items:center;gap:8px\"><input type=\"checkbox\" ${r.on!==false?'checked':''} onchange=\"toggleRem('${r.id}')\" style=\"width:18px;height:18px;accent-color:var(--pri)\"> <b>${esc(r.label)}<\u002Fb> <span class=\"muted\">${r.every?('la fiecare '+r.every+' h (08–22)'):r.time}<\u002Fspan><\u002Fspan><button class=\"btn sm warn\" onclick=\"delRem('${r.id}')\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>`).join(''):'<div class=\"empty\">Niciun memento încă.<\u002Fdiv>';\n  LI();\n}\nfunction addReminder(){\n  const l=document.getElementById('remLabel').value.trim(),t=document.getElementById('remTime').value;\n  if(!l)return toast('Scrie ce vrei să-ți amintești');\n  S.settings.reminders=S.settings.reminders||[];\n  S.settings.reminders.push({id:uid(),label:l,time:t||'09:00',on:true});\n  document.getElementById('remLabel').value='';\n  save();rReminders();maybeAskNotif();if(typeof pushCronSync==='function')pushCronSync();toast('Memento adăugat');\n}\nfunction addPreset(label,time){\n  S.settings.reminders=S.settings.reminders||[];\n  if(S.settings.reminders.some(r=>r.label===label&&r.time===time))return toast('Există deja');\n  S.settings.reminders.push({id:uid(),label,time,on:true});\n  save();rReminders();maybeAskNotif();if(typeof pushCronSync==='function')pushCronSync();toast(label+' '+time+' ✓');\n}\nfunction addWaterPreset(){\n  S.settings.reminders=S.settings.reminders||[];\n  if(S.settings.reminders.some(r=>r.label==='Bea apă'))return toast('Există deja');\n  S.settings.reminders.push({id:uid(),label:'Bea apă',every:2,on:true});\n  save();rReminders();maybeAskNotif();if(typeof pushCronSync==='function')pushCronSync();toast('Memento apă ✓');\n}\nfunction toggleRem(id){const r=(S.settings.reminders||[]).find(x=>x.id===id);if(r){r.on=r.on===false;save();if(typeof pushCronSync==='function')pushCronSync();}}\nfunction delRem(id){S.settings.reminders=(S.settings.reminders||[]).filter(x=>x.id!==id);save();rReminders();if(typeof pushCronSync==='function')pushCronSync();}\nfunction maybeAskNotif(){if('Notification' in window&&Notification.permission==='default')askNotif();}\nlet _editMemId=null;\nfunction openAddMember(){\n  _editMemId=null;\n  document.getElementById('memModalTitle').innerHTML='<i data-lucide=\"user-plus\"><\u002Fi>Adaugă un membru';\n  document.getElementById('memSaveBtn').innerHTML='<i data-lucide=\"user-plus\"><\u002Fi>Adaugă membru';\n  document.getElementById('nmName').value='';document.getElementById('nmEmail').value='';document.getElementById('nmColor').value='#3b82c4';\n  document.getElementById('memBack').classList.add('show');LI();setTimeout(()=>document.getElementById('nmName').focus(),60);\n}\nfunction openEditMember(id){\n  const m=memById(id);if(!m)return;_editMemId=id;\n  document.getElementById('memModalTitle').innerHTML='<i data-lucide=\"user-round-cog\"><\u002Fi>Editează membrul';\n  document.getElementById('memSaveBtn').innerHTML='<i data-lucide=\"save\"><\u002Fi>Salvează';\n  document.getElementById('nmName').value=m.name||'';document.getElementById('nmEmail').value=m.email||'';document.getElementById('nmColor').value=m.color||'#3b82c4';\n  document.getElementById('memBack').classList.add('show');LI();setTimeout(()=>document.getElementById('nmName').focus(),60);\n}\nfunction closeAddMember(){document.getElementById('memBack').classList.remove('show');}\nfunction saveMember(){\n  const n=document.getElementById('nmName').value.trim();if(!n)return toast('Scrie numele');\n  const color=document.getElementById('nmColor').value,email=document.getElementById('nmEmail').value.trim();\n  if(_editMemId){const m=memById(_editMemId);if(m){m.name=n;m.color=color;m.email=email;m.u=Date.now();}toast('Membru actualizat');}\n  else{S.members.push({id:uid(),name:n,color,email,u:Date.now()});toast('Membru adăugat');}\n  _editMemId=null;save();closeAddMember();render();\n  if(typeof pushCronSync==='function')pushCronSync();\n}\nfunction addMember(){saveMember();}\nfunction setMemberColor(id,color){const m=memById(id);if(!m)return;m.color=color;m.u=Date.now();save();rSet();toast('Culoare actualizată');}\nfunction delMember(id){if(S.members.length<=1)return toast('Trebuie să rămână cel puțin un membru');if(!confirm('Ștergi membrul?'))return;S.members=S.members.filter(m=>m.id!==id);tombstone(id);if(S.settings.activeUser===id)S.settings.activeUser=S.members[0].id;save();rSet();}\nfunction backup(){const d=new Date();dl('FamLink_'+dstr(d)+'_v1.0.json',JSON.stringify(S,null,1),'application/json');toast('Backup descărcat');}\nfunction restore(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.members)throw 0;S=Object.assign(defState(),d);save();toast('Date restaurate');render();}catch(e){toast('Fișier invalid');}};r.readAsText(f);inp.value='';}\n<\u002Fscript>\n<script>\n/* ============ MODUL SLĂBIT ============ */\nlet dietTab='prof';\nconst dietMid=()=>document.getElementById('dietWho').value||S.settings.activeUser||S.members[0].id;\nfunction clearAI(id){const el=document.getElementById(id);if(el)el.innerHTML='';}\nfunction clearAIOuts(){['aiProfOut','aiBodyOut','aiMenuOut','aiPhotoOut'].forEach(clearAI);}\nfunction aiShow(id,html,extra){const el=document.getElementById(id);if(!el)return;el.innerHTML='<div class=\"aibox\"><button class=\"aix\" title=\"Închide\" onclick=\"clearAI(\\''+id+'\\')\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><div class=\"aihead\"><span class=\"badge\"><i data-lucide=\"sparkles\"><\u002Fi><\u002Fspan><b>Asistent AI<\u002Fb><\u002Fdiv>'+html+'<\u002Fdiv>'+(extra||'');LI();}\nfunction aiLoad(t){return '<div class=\"aibox load\"><span class=\"typing\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>'+t+'<\u002Fdiv>';}\nfunction aiErr(t){return '<div class=\"aibox err\">'+t+'<\u002Fdiv>';}\nfunction dTab(t){dietTab=t;clearAIOuts();document.querySelectorAll('[data-dt]').forEach(b=>b.classList.toggle('on',b.dataset.dt===t));['prof','body','fast','sport','meal','ai'].forEach(x=>document.getElementById('dt-'+x).style.display=x===t?'':'none');rDiet();}\nfunction rDiet(){\n  const sel=document.getElementById('dietWho');\n  const cur=sel.value;\n  sel.innerHTML=S.members.map(m=>`<option value=\"${m.id}\">${esc(m.name)}<\u002Foption>`).join('');\n  if(cur&&S.members.some(m=>m.id===cur))sel.value=cur;\n  else if(S.settings.activeUser&&S.members.some(m=>m.id===S.settings.activeUser))sel.value=S.settings.activeUser;\n  if(dietTab==='prof')rProf();else if(dietTab==='body')rBody();else if(dietTab==='fast')fastPaint(true);else if(dietTab==='sport')rSport();else if(dietTab==='meal')rMeals();else if(dietTab==='ai')rAI();\n}\n\n/* ---- profil + calcule ---- */\nfunction getProf(){return S.diet.profiles[dietMid()]||{};}\nfunction lastW(){const ws=S.diet.weights[dietMid()]||[];return ws.length?ws[ws.length-1].w:null;}\nfunction rProf(){\n  const p=getProf();\n  document.getElementById('pSex').value=p.sex||'M';\n  document.getElementById('pAge').value=p.age||'';\n  document.getElementById('pH').value=p.h||'';\n  document.getElementById('pW').value=lastW()||p.w||'';\n  document.getElementById('pT').value=p.target||'';\n  document.getElementById('pAct').value=p.activity||'1.375';\n  paintStats();paintChart();\n}\nfunction calc(p,w){\n  if(!p.age||!p.h||!w)return null;\n  const bmr=Math.round(10*w+6.25*p.h-5*p.age+(p.sex==='F'?-161:5));\n  const tdee=Math.round(bmr*Number(p.activity||1.375));\n  const target=Math.max(1200,tdee-500);\n  const bmi=+(w/((p.h/100)**2)).toFixed(1);\n  return {bmr,tdee,target,bmi};\n}\nfunction paintStats(){\n  const p=getProf(),w=lastW();\n  const c=calc(p,w);\n  const el=document.getElementById('pStats');\n  if(!c){el.innerHTML='<div class=\"empty\" style=\"grid-column:1/-1\">Completează profilul și salvează pentru a vedea calculele.<\u002Fdiv>';return;}\n  const toGo=p.target?(w-p.target).toFixed(1):null;\n  const bmiTxt=c.bmi<18.5?'subponderal':c.bmi<25?'normal':c.bmi<30?'supraponderal':'obezitate';\n  el.innerHTML=`\n    <div class=\"stat\"><b>${w}<\u002Fb><span>kg acum<\u002Fspan><\u002Fdiv>\n    ${toGo!==null?`<div class=\"stat\"><b style=\"color:${toGo>0?'var(--rose)':'var(--pri)'}\">${toGo>0?'-'+toGo:'✓'}<\u002Fb><span>${toGo>0?'kg până la țintă':'țintă atinsă!'}<\u002Fspan><\u002Fdiv>`:''}\n    <div class=\"stat\"><b>${c.bmi}<\u002Fb><span>IMC · ${bmiTxt}<\u002Fspan><\u002Fdiv>\n    <div class=\"stat\"><b>${c.bmr}<\u002Fb><span>BMR kcal<\u002Fspan><\u002Fdiv>\n    <div class=\"stat\"><b>${c.tdee}<\u002Fb><span>menținere kcal<\u002Fspan><\u002Fdiv>\n    <div class=\"stat\"><b style=\"color:var(--pri)\">${c.target}<\u002Fb><span>ținta zilnică kcal<\u002Fspan><\u002Fdiv>`;\n  LI();\n}\nfunction saveProfile(){\n  const mid=dietMid();\n  const p={sex:document.getElementById('pSex').value,age:Number(document.getElementById('pAge').value)||null,h:Number(document.getElementById('pH').value)||null,target:Number(document.getElementById('pT').value)||null,activity:document.getElementById('pAct').value};\n  S.diet.profiles[mid]=Object.assign(getProf(),p);\n  const w=Number(document.getElementById('pW').value);\n  if(w){S.diet.weights[mid]=S.diet.weights[mid]||[];const ws=S.diet.weights[mid];const t=todayStr();const ex=ws.find(x=>x.d===t);if(ex)ex.w=w;else ws.push({d:t,w});ws.sort((a,b)=>a.d<b.d?-1:1);}\n  save();paintStats();paintChart();toast('Profil salvat');\n}\nfunction paintChart(){\n  const ws=S.diet.weights[dietMid()]||[];\n  const el=document.getElementById('wChart');\n  if(ws.length<2){el.innerHTML='<span class=\"muted\">Cântărește-te câteva zile ca să apară graficul<\u002Fspan>';return;}\n  const W=560,H=170,P=28;\n  const min=Math.min(...ws.map(x=>x.w))-1,max=Math.max(...ws.map(x=>x.w))+1;\n  const X=i=>P+i*(W-2*P)/(ws.length-1),Y=w=>H-P-(w-min)*(H-2*P)/(max-min||1);\n  const pts=ws.map((x,i)=>X(i)+','+Y(x.w)).join(' ');\n  const tgt=getProf().target;\n  el.innerHTML=`<svg viewBox=\"0 0 ${W} ${H}\" style=\"width:100%;max-width:620px\">\n    ${tgt&&tgt>min&&tgt<max?`<line x1=\"${P}\" x2=\"${W-P}\" y1=\"${Y(tgt)}\" y2=\"${Y(tgt)}\" stroke=\"#16a37f\" stroke-dasharray=\"5 4\" stroke-width=\"1.5\"/><text x=\"${W-P}\" y=\"${Y(tgt)-4}\" font-size=\"10\" fill=\"#16a37f\" text-anchor=\"end\">țintă ${tgt} kg<\u002Ftext>`:''}\n    <polyline points=\"${pts}\" fill=\"none\" stroke=\"#16a37f\" stroke-width=\"2.5\" stroke-linejoin=\"round\"/>\n    ${ws.map((x,i)=>`<circle cx=\"${X(i)}\" cy=\"${Y(x.w)}\" r=\"3.5\" fill=\"#16a37f\"/><text x=\"${X(i)}\" y=\"${Y(x.w)-8}\" font-size=\"9.5\" fill=\"#1e3a34\" text-anchor=\"middle\" font-weight=\"700\">${x.w}<\u002Ftext>`).join('')}\n    ${ws.map((x,i)=>(i===0||i===ws.length-1||ws.length<8)?`<text x=\"${X(i)}\" y=\"${H-8}\" font-size=\"9\" fill=\"#7d938c\" text-anchor=\"middle\">${x.d.slice(5).replace('-','.')}<\u002Ftext>`:'').join('')}\n  <\u002Fsvg>`;\n}\n\n/* ---- analiză corporală (US Navy + praguri OMS) ---- */\nfunction rBody(){\n  const p=getProf();\n  document.getElementById('bWaist').value=p.waist||'';\n  document.getElementById('bNeck').value=p.neck||'';\n  document.getElementById('bHip').value=p.hip||'';\n  document.getElementById('bHipWrap').style.display=(p.sex==='F')?'':'none';\n  paintBody();LI();\n}\nfunction saveBody(){\n  const mid=dietMid();\n  S.diet.profiles[mid]=Object.assign(getProf(),{waist:Number(document.getElementById('bWaist').value)||null,neck:Number(document.getElementById('bNeck').value)||null,hip:Number(document.getElementById('bHip').value)||null});\n  save();paintBody();toast('Analiză salvată');\n}\nfunction bodyCalc(){\n  const p=getProf(),w=lastW();\n  if(!p.h||!p.waist||!p.neck||!w)return null;\n  const L=Math.log10;let bf;\n  if(p.sex==='F'){if(!p.hip)return null;bf=495/(1.29579-0.35004*L(p.waist+p.hip-p.neck)+0.22100*L(p.h))-450;}\n  else{bf=495/(1.0324-0.19077*L(p.waist-p.neck)+0.15456*L(p.h))-450;}\n  bf=Math.max(2,Math.min(60,+bf.toFixed(1)));\n  const whtr=+(p.waist/p.h).toFixed(2);\n  return {bf,whtr,fatKg:+(w*bf/100).toFixed(1),leanKg:+(w*(1-bf/100)).toFixed(1)};\n}\nfunction bfCat(bf,sex){\n  const t=sex==='F'?[13,20,24,31]:[5,13,17,24];\n  return bf<=t[0]?'esențial':bf<=t[1]?'atletic':bf<=t[2]?'fitness':bf<=t[3]?'mediu':'ridicat';\n}\nfunction paintBody(){\n  const p=getProf(),w=lastW(),b=bodyCalc();\n  const st=document.getElementById('bStats'),tp=document.getElementById('bTips');\n  if(!b){st.innerHTML='<div class=\"empty\" style=\"grid-column:1/-1\">Completează profilul (înălțime + greutate) și măsurile de mai sus.<\u002Fdiv>';tp.innerHTML='';return;}\n  const cat=bfCat(b.bf,p.sex);\n  const waistRisk=p.sex==='F'?(p.waist>88?2:p.waist>80?1:0):(p.waist>102?2:p.waist>94?1:0);\n  st.innerHTML=`\n    <div class=\"stat\"><b style=\"color:var(--pri)\">${b.bf}%<\u002Fb><span>grăsime corporală · ${cat}<\u002Fspan><\u002Fdiv>\n    <div class=\"stat\"><b>${b.fatKg}<\u002Fb><span>kg masă grasă<\u002Fspan><\u002Fdiv>\n    <div class=\"stat\"><b>${b.leanKg}<\u002Fb><span>kg masă slabă<\u002Fspan><\u002Fdiv>\n    <div class=\"stat\"><b style=\"color:${b.whtr>0.5?'var(--rose)':'var(--pri)'}\">${b.whtr}<\u002Fb><span>talie/înălțime ${b.whtr>0.5?'· peste 0,5':'· OK'}<\u002Fspan><\u002Fdiv>\n    <div class=\"stat\"><b style=\"color:${['var(--pri)','var(--amber)','var(--rose)'][waistRisk]}\">${p.waist} cm<\u002Fb><span>talie · risc ${['scăzut','crescut','ridicat'][waistRisk]}<\u002Fspan><\u002Fdiv>`;\n  const tips=[];\n  if(waistRisk>0)tips.push('Talia peste pragul OMS ('+(p.sex==='F'?'80':'94')+' cm) crește riscul cardiometabolic — prioritizează reducerea ei, nu doar kilogramele.');\n  if(b.whtr>0.5)tips.push('Regula OMS „ține talia sub jumătate din înălțime\": ținta ta de talie e sub '+Math.round(p.h/2)+' cm.');\n  tips.push('OMS recomandă 150–300 min de mișcare moderată pe săptămână + 2 antrenamente de forță — forța păstrează masa slabă ('+b.leanKg+' kg) în timpul slăbirii.');\n  tips.push('Un deficit de ~500 kcal/zi ≈ 0,5 kg/săptămână (CDC/NIH) — ritm sigur și sustenabil; evită scăderi sub 1.200 kcal/zi fără supraveghere medicală.');\n  tips.push('La slăbit, 1,2–1,6 g proteine/kg corp/zi ajută sațietatea și mușchii — pentru tine ≈ '+Math.round(w*1.2)+'–'+Math.round(w*1.6)+' g/zi.');\n  tips.push('Zahăr adăugat sub 10% din calorii și 25–30 g fibre/zi (OMS); somnul de 7–9 h susține hormonii sațietății.');\n  tp.innerHTML='<h3><i data-lucide=\"clipboard-list\"><\u002Fi>Sfaturi (ghiduri OMS / CDC / NIH)<\u002Fh3>'+tips.map(t=>`<div class=\"mealrow\" style=\"justify-content:flex-start;gap:8px\"><i data-lucide=\"check\" style=\"color:var(--pri);width:16px;height:16px;flex:none;margin-top:2px\"><\u002Fi><span>${t}<\u002Fspan><\u002Fdiv>`).join('')+\n    '<p class=\"muted\" style=\"margin-top:8px\">Surse publice: WHO Guidelines on physical activity (2020), WHO healthy diet fact sheet, CDC Healthy Weight, NIH/NHLBI Obesity Guidelines, metoda US Navy (Hodgdon &amp; Beckett, 1984). Informativ — nu înlocuiește medicul.<\u002Fp>';\n  LI();\n}\n\n/* ---- fasting ---- */\nfunction fastProto(){\n  const sel=document.getElementById('fProto'),ci=document.getElementById('fCustomH');\n  if(sel.value==='custom'){ci.style.display='';const v=Number(ci.value);if(v>0)S.diet.fasting.hours=v;}\n  else{ci.style.display='none';S.diet.fasting.hours=Number(sel.value);}\n  save();fastPaint();\n}\nfunction fastToggle(){\n  const f=S.diet.fasting;\n  if(f.active){\n    const el=(Date.now()-new Date(f.start))/36e5;\n    f.history.unshift({start:f.start,end:new Date().toISOString(),h:+el.toFixed(1),goal:f.hours});\n    f.history=f.history.slice(0,30);f.active=false;f.start=null;\n    toast('Fasting oprit la '+el.toFixed(1)+' h');\n    if(typeof pushReady==='function'&&pushReady())pushQueue({action:'schedule',groups:[{prefix:'fast_'+DID,items:[]}]});\n  }else{\n    f.active=true;f.start=new Date().toISOString();toast('Fasting pornit — succes! Primești notificare la '+f.hours+' h');askNotifSilent();\n    if(typeof pushReady==='function'&&pushReady()&&pushOn('fasting',true)&&myEmail())pushQueue({action:'schedule',groups:[{prefix:'fast_'+DID,items:[{key:'fast_'+DID,at:new Date(Date.now()+f.hours*3600e3).toISOString(),to:[myEmail()],title:'Fasting complet ('+f.hours+' h)',body:'Ai atins ținta de '+f.hours+' ore. Bravo — poți mânca.\\n— FamLink'}]}]});\n  }\n  save();fastPaint(true);\n}\nfunction askNotifSilent(){if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();}\nfunction fastPaint(full){\n  const f=S.diet.fasting;\n  if(document.getElementById('dt-fast').style.display==='none'&&!full)return;\n  const hv=String(f.hours||16),selP=document.getElementById('fProto'),ci=document.getElementById('fCustomH');\n  if(['14','16','18','20'].includes(hv)){selP.value=hv;ci.style.display='none';}\n  else{selP.value='custom';ci.style.display='';if(!ci.value)ci.value=hv;}\n  const C=527.8,ring=document.getElementById('fRing');\n  if(f.active&&f.start){\n    const el=(Date.now()-new Date(f.start))/1000,goal=f.hours*3600;\n    const pct=Math.min(1,el/goal);\n    ring.style.strokeDashoffset=C*(1-pct);\n    const hh=Math.floor(el/3600),mm=Math.floor(el%3600/60);\n    document.getElementById('fTime').textContent=hh+':'+pad(mm);\n    const rem=goal-el;\n    document.getElementById('fSub').textContent=rem>0?('mai ai '+Math.floor(rem/3600)+':'+pad(Math.floor(rem%3600/60))+' din '+f.hours+' h'):'țintă atinsă — bravo!';\n    if(document.getElementById('fBtn').dataset.st!=='on'){document.getElementById('fBtn').innerHTML='<i data-lucide=\"square\"><\u002Fi>Oprește fastingul';document.getElementById('fBtn').dataset.st='on';LI();}\n  }else{\n    ring.style.strokeDashoffset=C;\n    document.getElementById('fTime').textContent='00:00';\n    document.getElementById('fSub').textContent='oprit';\n    if(document.getElementById('fBtn').dataset.st!=='off'){document.getElementById('fBtn').innerHTML='<i data-lucide=\"play\"><\u002Fi>Începe fastingul';document.getElementById('fBtn').dataset.st='off';LI();}\n  }\n  document.getElementById('fHist').innerHTML=f.history.length?f.history.slice(0,7).map(h=>{\n    const ok=h.h>=h.goal;\n    return `<div class=\"mealrow\"><span>${new Date(h.start).toLocaleDateString('ro-RO',{day:'numeric',month:'short'})} · ${h.h} h / ${h.goal} h<\u002Fspan><i data-lucide=\"${ok?'circle-check':'triangle-alert'}\" style=\"color:${ok?'var(--pri)':'var(--amber)'};width:17px;height:17px\"><\u002Fi><\u002Fdiv>`;\n  }).join(''):'<div class=\"empty\">Încă niciun fasting încheiat.<\u002Fdiv>';\n  LI();\n}\nsetInterval(()=>{if(S.diet.fasting.active&&document.getElementById('dt-fast').style.display!=='none'&&VIEW==='health')fastPaint();},1000);\n\n/* ---- mese ---- */\nconst RECS=[\n  {n:'Omletă din 3 ouă cu spanac și roșii',c:420,t:'Mic dejun'},{n:'Iaurt grecesc cu fructe de pădure și nuci',c:320,t:'Mic dejun'},\n  {n:'Ovăz cu banană și unt de arahide',c:390,t:'Mic dejun'},{n:'Piept de pui la grătar cu salată mare',c:450,t:'Prânz'},\n  {n:'Somon la cuptor cu broccoli',c:520,t:'Prânz'},{n:'Ciorbă de legume + felie pâine integrală',c:300,t:'Prânz'},\n  {n:'Linte gătită cu legume',c:380,t:'Prânz'},{n:'Salată de ton cu ou și avocado',c:430,t:'Cină'},\n  {n:'Piept de curcan cu legume la tigaie',c:400,t:'Cină'},{n:'Brânză cottage cu castraveți',c:220,t:'Cină'},\n  {n:'Un măr + 10 migdale',c:160,t:'Gustare'},{n:'Morcovi cu hummus',c:150,t:'Gustare'}\n];\n/* ---- sport ---- */\nconst MET={'alergare':9.8,'mers alert':4.3,'sală (forță)':5,'sala (forta)':5,'forță':5,'forta':5,'bicicletă':7.5,'bicicleta':7.5,'înot':7,'inot':7,'fotbal':7,'tenis':7,'yoga':2.8,'drumeție':6,'drumetie':6,'altul':5};\nfunction metFor(name){const k=(name||'').toLowerCase().trim();if(MET[k])return MET[k];for(const m in MET){if(k.includes(m))return MET[m];}return 5;}\nfunction sportKcal(name,min){const w=lastW()||getProf().w||75;return Math.round(metFor(name)*w*(min/60));}\nfunction todaySports(){return (S.diet.sports||[]).filter(s=>s.mid===dietMid()&&s.date===todayStr());}\nfunction addSport(){\n  const name=document.getElementById('spType').value;\n  const min=Number(document.getElementById('spMin').value);\n  if(!min||min<1)return toast('Scrie câte minute');\n  let cal=Number(document.getElementById('spCal').value);if(!cal)cal=sportKcal(name,min);\n  logSport(name,min,cal);\n  document.getElementById('spMin').value='';document.getElementById('spCal').value='';\n}\nfunction logSport(name,min,cal){\n  S.diet.sports=S.diet.sports||[];\n  S.diet.sports.push({id:uid(),mid:dietMid(),date:todayStr(),name:name||'Sport',minutes:Number(min)||0,kcal:Number(cal)||sportKcal(name,min)});\n  save();if(dietTab==='sport')rSport();toast('Sport adăugat: '+name+' '+min+' min');\n}\nfunction delSport(id){S.diet.sports=(S.diet.sports||[]).filter(s=>s.id!==id);tombstone(id);save();rSport();}\nfunction rSport(){\n  const ss=todaySports();\n  const totMin=ss.reduce((a,b)=>a+(b.minutes||0),0),totCal=ss.reduce((a,b)=>a+(b.kcal||0),0);\n  document.getElementById('sportPill').textContent=totMin+' min · '+totCal+' kcal';\n  document.getElementById('sportList').innerHTML=ss.length?ss.map(s=>`<div class=\"mealrow\"><span><b>${esc(s.name)}<\u002Fb> · ${s.minutes} min<\u002Fspan><span class=\"row\" style=\"gap:8px\"><span class=\"k\">${s.kcal} kcal<\u002Fspan><button class=\"btn sm warn\" onclick=\"delSport('${s.id}')\">✕<\u002Fbutton><\u002Fspan><\u002Fdiv>`).join(''):'<div class=\"empty mealsempty\"><i data-lucide=\"dumbbell\"><\u002Fi><span>Niciun sport azi. Hai, mișcă-te!<\u002Fspan><\u002Fdiv>';\n  // săptămâna\n  const now=new Date(),wk=(S.diet.sports||[]).filter(s=>{if(s.mid!==dietMid())return false;const d=fromStr(s.date);return (now-d)/864e5<7;});\n  const wm=wk.reduce((a,b)=>a+(b.minutes||0),0),wc=wk.reduce((a,b)=>a+(b.kcal||0),0);\n  const goal=150;\n  document.getElementById('sportWeek').innerHTML=`<div class=\"statgrid\"><div class=\"stat\"><b style=\"color:${wm>=goal?'var(--pri)':'var(--ink)'}\">${wm}<\u002Fb><span>min / ${goal} (OMS)<\u002Fspan><\u002Fdiv><div class=\"stat\"><b>${wk.length}<\u002Fb><span>sesiuni<\u002Fspan><\u002Fdiv><div class=\"stat\"><b>${wc}<\u002Fb><span>kcal arse<\u002Fspan><\u002Fdiv><\u002Fdiv>`;\n  LI();\n}\n/* ---- apă ---- */\nfunction logWater(ml){\n  const mid=dietMid(),t=todayStr();\n  S.diet.water=S.diet.water||{};S.diet.water[mid]=S.diet.water[mid]||{};\n  S.diet.water[mid][t]=(S.diet.water[mid][t]||0)+(Number(ml)||250);\n  save();if(dietTab==='meal')rMeals();\n}\nfunction waterToday(){const mid=dietMid();return (S.diet.water&&S.diet.water[mid]&&S.diet.water[mid][todayStr()])||0;}\nfunction todayMeals(){return S.diet.meals.filter(m=>m.mid===dietMid()&&m.date===todayStr());}\nfunction rMeals(){\n  const ms=todayMeals(),tot=ms.reduce((a,b)=>a+(b.cal||0),0);\n  const c=calc(getProf(),lastW());\n  const tgt=c?c.target:2000;\n  document.getElementById('calPill').textContent=tot+' / '+tgt+' kcal';\n  document.getElementById('calPill').style.cssText='background:'+(tot>tgt?'#fdeef1;color:#c94258':'var(--soft);color:var(--pri2)');\n  document.getElementById('calBar').style.width=Math.min(100,tot/tgt*100)+'%';\n  document.getElementById('mealList').innerHTML=ms.length?ms.map(m=>`<div class=\"mealrow\"><span><b>${m.type}<\u002Fb> · ${esc(m.name)}<\u002Fspan><span class=\"row\" style=\"gap:8px\"><span class=\"k\">${m.cal} kcal<\u002Fspan><button class=\"btn sm warn\" onclick=\"delMeal('${m.id}')\">✕<\u002Fbutton><\u002Fspan><\u002Fdiv>`).join(''):'<div class=\"empty mealsempty\"><i data-lucide=\"utensils-crossed\"><\u002Fi><span>Nicio masă înregistrată azi.<\u002Fspan><\u002Fdiv>';\n  const wt=waterToday();\n  const wel=document.getElementById('waterLine');if(wel)wel.innerHTML=`<span style=\"display:inline-flex;align-items:center;gap:7px\"><i data-lucide=\"glass-water\" style=\"color:var(--blue);width:17px;height:17px\"><\u002Fi><b>Apă azi:<\u002Fb> ${wt} ml <span class=\"muted\">(${(wt/250).toFixed(1)} pahare)<\u002Fspan><\u002Fspan><span class=\"row\" style=\"gap:6px\"><button class=\"btn sm sec\" onclick=\"logWater(250)\">+250 ml<\u002Fbutton><button class=\"btn sm ghost\" onclick=\"logWater(500)\">+500<\u002Fbutton><\u002Fspan>`;\n  document.getElementById('recList').innerHTML=RECS.filter(r=>!c||r.c<=tgt/2).slice(0,8).map(r=>`<div class=\"mealrow\"><span>${esc(r.n)} <span class=\"muted\">· ${r.t}<\u002Fspan><\u002Fspan><span class=\"row\" style=\"gap:8px\"><span class=\"k\">${r.c}<\u002Fspan><button class=\"btn sm sec\" onclick=\"quickMeal('${esc(r.n)}',${r.c},'${r.t}')\">＋<\u002Fbutton><\u002Fspan><\u002Fdiv>`).join('');\n  LI();\n}\nfunction addMeal(){\n  const n=document.getElementById('mlName').value.trim(),c=Number(document.getElementById('mlCal').value);\n  if(!n)return toast('Scrie ce ai mâncat');\n  S.diet.meals.push({id:uid(),mid:dietMid(),date:todayStr(),type:document.getElementById('mlType').value,name:n,cal:c||0});\n  document.getElementById('mlName').value='';document.getElementById('mlCal').value='';\n  save();rMeals();toast('Masă adăugată ️');\n}\nfunction quickMeal(n,c,t){S.diet.meals.push({id:uid(),mid:dietMid(),date:todayStr(),type:t,name:n,cal:c});save();rMeals();toast('Adăugat: '+n);}\nfunction delMeal(id){S.diet.meals=S.diet.meals.filter(m=>m.id!==id);tombstone(id);save();rMeals();}\n<\u002Fscript>\n<script type=\"text/plain\" id=\"gasCodeTpl\">\n/**\n * FamLink — Notificari pe email (ruleaza gratuit in contul tau Google)\n * --------------------------------------------------------------------\n * Instalare: Deploy -> New deployment -> Web app ->\n * Execute as: Me · Who has access: Anyone -> Deploy.\n * Apoi copiaza URL-ul (…/exec) in FamLink -> Setari -> Notificari pe email.\n */\nvar SECRET = 'SCHIMBA-MA';\nvar TZ = 'Europe/Bucharest'; // fusul orar pentru mementourile zilnice\n\nfunction doGet() {\n  return ContentService.createTextOutput('FamLink notificari — scriptul functioneaza. Configureaza-l din aplicatie (Setari -> Notificari pe email).');\n}\n\nfunction doPost(e) {\n  var lock = LockService.getScriptLock();\n  var out = { ok: false };\n  try {\n    lock.waitLock(20000);\n    var d = JSON.parse(e.postData.contents);\n    if (d.secret !== SECRET) return json_({ ok: false, err: 'secret gresit' });\n    ensureTrigger_();\n    var P = PropertiesService.getScriptProperties();\n\n    if (d.action === 'test') {\n      var to = (d.to && d.to.length) ? d.to : [Session.getEffectiveUser().getEmail()];\n      send_(to, 'FamLink — test reusit', 'Notificarile pe email functioneaza.' + String.fromCharCode(10) + 'Ora scriptului: ' + Utilities.formatDate(new Date(), TZ, 'HH:mm') + ' (' + TZ + ').' + String.fromCharCode(10) + 'De acum primesti notificarile FamLink pe acest email.');\n      out = { ok: true, msg: 'test trimis: ' + to.join(', ') };\n\n    } else if (d.action === 'send') {\n      send_(d.to, d.title, d.body, d.html, d.ics, d.icsName);\n      out = { ok: true };\n\n    } else if (d.action === 'schedule') {\n      (d.groups || []).forEach(function (g) {\n        delPrefix_(P, 'q_' + g.prefix);\n        (g.items || []).forEach(function (it) {\n          if (it.key && it.at && it.to && it.to.length) {\n            P.setProperty('q_' + it.key, JSON.stringify({ at: it.at, to: it.to, title: it.title || 'FamLink', body: it.body || '', html: it.html || '' }));\n          }\n        });\n      });\n      if (d.sweepPrefix && d.keep) {\n        var keep = {};\n        (d.keep || []).forEach(function (id) { keep[id] = 1; });\n        Object.keys(P.getProperties()).forEach(function (k) {\n          if (k.indexOf('q_' + d.sweepPrefix) === 0) {\n            var id = k.slice(('q_' + d.sweepPrefix).length).split('_')[0];\n            if (!keep[id]) P.deleteProperty(k);\n          }\n        });\n      }\n      out = { ok: true, programate: countQ_(P) };\n\n    } else if (d.action === 'cancel') {\n      out = { ok: true, sterse: delPrefix_(P, 'q_' + (d.prefix || '')) };\n\n    } else if (d.action === 'cron') {\n      if (d.device) P.setProperty('cron_' + d.device, JSON.stringify({ email: d.email || '', items: d.items || [] }));\n      out = { ok: true };\n\n    } else if (d.action === 'status') {\n      out = { ok: true, programate: countQ_(P), ora: Utilities.formatDate(new Date(), TZ, 'HH:mm') };\n\n    } else {\n      out = { ok: false, err: 'actiune necunoscuta' };\n    }\n  } catch (err) {\n    out = { ok: false, err: String(err) };\n  } finally {\n    try { lock.releaseLock(); } catch (ignore) {}\n  }\n  return json_(out);\n}\n\n/* Ruleaza automat la fiecare minut (trigger-ul se creeaza singur la primul test). */\nfunction tick() {\n  var P = PropertiesService.getScriptProperties();\n  var all = P.getProperties();\n  var now = new Date();\n  Object.keys(all).forEach(function (k) {\n    if (k.indexOf('q_') !== 0) return;\n    var it = null;\n    try { it = JSON.parse(all[k]); } catch (e) {}\n    if (!it || !it.at) { P.deleteProperty(k); return; }\n    var at = new Date(it.at);\n    if (at <= now) {\n      if (now - at < 15 * 60000) send_(it.to, it.title, it.body, it.html);\n      P.deleteProperty(k);\n    }\n  });\n  var hm = Utilities.formatDate(now, TZ, 'HH:mm');\n  var today = Utilities.formatDate(now, TZ, 'yyyy-MM-dd');\n  var h = Number(hm.slice(0, 2)), mi = Number(hm.slice(3));\n  var nowMin = h * 60 + mi;\n  var cache = CacheService.getScriptCache();\n  Object.keys(all).forEach(function (k) {\n    if (k.indexOf('cron_') !== 0) return;\n    var c = null;\n    try { c = JSON.parse(all[k]); } catch (e) {}\n    if (!c || !c.email) return;\n    (c.items || []).forEach(function (it) {\n      var due = false, slot = '';\n      if (Number(it.every)) {\n        due = (h >= 8 && h <= 22 && h % Number(it.every) === 0 && mi < 2);\n        slot = 'h' + h;\n      } else if (it.time && /^\\d{1,2}:\\d{2}$/.test(it.time)) {\n        var parts = it.time.split(':');\n        var itMin = Number(parts[0]) * 60 + Number(parts[1]);\n        due = (nowMin - itMin >= 0 && nowMin - itMin < 2);\n        slot = it.time;\n      }\n      if (!due) return;\n      var ck = 's_' + k + '_' + (it.id || it.label) + '_' + today + '_' + slot;\n      if (cache.get(ck)) return;\n      cache.put(ck, '1', 7200);\n      send_([c.email], 'Memento: ' + (it.label || 'FamLink'), 'E momentul! (' + hm + ')');\n    });\n  });\n}\n\nfunction send_(to, title, body, html, ics, icsName) {\n  var att = null;\n  // 'application/octet-stream': Gmail ascunde atasamentele text/calendar (le trateaza ca invitatii);\n  // ca fisier generic apare mereu in mesaj, iar iPhone il deschide dupa extensie direct in Calendar.\n  if (ics) { try { att = [Utilities.newBlob(ics, 'application/octet-stream', icsName || 'FamLink.ics')]; } catch (e) { att = null; } }\n  (to || []).forEach(function (a) {\n    if (!a || String(a).indexOf('@') < 0) return;\n    var opt = { to: String(a), subject: title || 'FamLink', body: (body || ' '), name: 'FamLink' };\n    if (html) opt.htmlBody = html;\n    if (att) opt.attachments = att;\n    try { MailApp.sendEmail(opt); } catch (e) {}\n  });\n}\nfunction delPrefix_(P, pre) {\n  var n = 0;\n  Object.keys(P.getProperties()).forEach(function (k) { if (k.indexOf(pre) === 0) { P.deleteProperty(k); n++; } });\n  return n;\n}\nfunction countQ_(P) {\n  return Object.keys(P.getProperties()).filter(function (k) { return k.indexOf('q_') === 0; }).length;\n}\nfunction json_(o) {\n  return ContentService.createTextOutput(JSON.stringify(o)).setMimeType(ContentService.MimeType.JSON);\n}\nfunction ensureTrigger_() {\n  var has = ScriptApp.getProjectTriggers().some(function (t) { return t.getHandlerFunction() === 'tick'; });\n  if (!has) ScriptApp.newTrigger('tick').timeBased().everyMinutes(1).create();\n}\n<\u002Fscript>\n<script>\n/* ============ NOTIFICĂRI PE EMAIL (telefon & desktop, prin Google Apps Script) ============\n   Aplicația trimite cereri către un mic script din contul Google al utilizatorului, care:\n   - trimite instant emailuri (activități noi/modificate);\n   - păstrează o coadă de notificări programate (memento evenimente, fasting, agenda zilei)\n     și le trimite la ora potrivită, chiar dacă aplicația e închisă (trigger la 1 min);\n   - trimite mementourile zilnice după un cron per dispozitiv.\n   Emailul apare pe telefon ca notificare prin aplicația Gmail. */\nconst DID=(function(){let d=localStorage.getItem('famlink_device');if(!d){d=uid();localStorage.setItem('famlink_device',d);}return d;})();\nfunction PUSH(){return S.settings.push||{};}\nfunction pushReady(){const p=PUSH();return !!(p.url&&p.secret);}\nfunction pushOn(k,def){const p=PUSH();const v=(p.on&&(k in p.on))?p.on[k]:def;return !!v;}\nfunction memEmail(id){const m=memById(id);const e=m&&(m.email||'').trim();return e&&e.indexOf('@')>0?e:null;}\nfunction myEmail(){return memEmail(S.settings.activeUser||S.members[0].id);}\nfunction evEmails(ev){const ms=(ev.members||[]).filter(id=>memById(id));const ids=ms.length?ms:S.members.map(m=>m.id);return [...new Set(ids.map(memEmail).filter(Boolean))];}\nfunction nfMin(n){n=Number(n)||0;return n===0?'chiar acum':(n>=60?(n%60===0?(n/60)+' h':Math.floor(n/60)+' h '+(n%60)+' min'):n+' min');}\n/* --- emailuri frumoase (HTML) cu link rapid către aplicație --- */\nconst APP_URL=(location.protocol==='http:'||location.protocol==='https:')?(location.origin+location.pathname):'https://drg2121.github.io/famlink/';\n/* linkul din emailuri include accesul de sincronizare (ca „Trimite acces altui dispozitiv\") —\n   deschis pe un dispozitiv neconectat se conectează automat, nu mai apare pagina goală */\nfunction appLink(){\n  try{\n    if(typeof SYNC!=='undefined'&&SYNC.token&&SYNC.pass&&SYNC.gistId){\n      return APP_URL+'#sync='+btoa(JSON.stringify({t:SYNC.token,g:SYNC.gistId,p:SYNC.pass}));\n    }\n  }catch(e){}\n  return APP_URL;\n}\nfunction mailEsc(s){return String(s||'').replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');}\nfunction mailBtn(txt){return '<a href=\"'+appLink()+'\" style=\"display:inline-block;background:#16a37f;color:#ffffff;text-decoration:none;font-weight:700;font-size:14px;padding:11px 22px;border-radius:12px\">'+txt+'<\u002Fa>';}\nfunction mailWrap(inner){\n  return '<div style=\"margin:0;padding:18px 10px;background:#f2f7f4;font-family:-apple-system,\\'Segoe UI\\',Roboto,Arial,sans-serif\">'\n    +'<div style=\"max-width:520px;margin:0 auto;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e2ede7\">'\n    +'<div style=\"background:#0e7c60;background:linear-gradient(135deg,#0e7c60,#16a37f);padding:13px 20px;color:#ffffff;font-weight:800;font-size:17px;letter-spacing:.3px\">FamLink<\u002Fdiv>'\n    +'<div style=\"padding:18px 20px 20px\">'+inner+'<\u002Fdiv>'\n    +'<div style=\"padding:11px 20px;background:#f6fbf8;color:#7d938c;font-size:12px\">Trimis automat de FamLink — calendarul familiei.<\u002Fdiv>'\n    +'<\u002Fdiv><\u002Fdiv>';\n}\nfunction mailKicker(t){return '<div style=\"font-size:12.5px;color:#16a37f;font-weight:700;letter-spacing:.5px;text-transform:uppercase\">'+t+'<\u002Fdiv>';}\nfunction mailTitle(t){return '<div style=\"font-size:20px;font-weight:800;color:#1c2b26;margin:4px 0 12px;line-height:1.25\">'+mailEsc(t)+'<\u002Fdiv>';}\nfunction mailRow(l,v){return '<tr><td style=\"padding:4px 12px 4px 0;color:#7d938c;font-size:13px;white-space:nowrap;vertical-align:top\">'+l+'<\u002Ftd><td style=\"padding:4px 0;font-size:14px;color:#1c2b26\">'+v+'<\u002Ftd><\u002Ftr>';}\nfunction evMailHtml(ev,meName,isNew){\n  const c=(typeof CATS!=='undefined'&&CATS[ev.cat])?CATS[ev.cat]:{n:'Altele'};\n  return mailKicker(isNew?'Activitate nouă':'Activitate modificată')\n    +mailTitle(ev.title)\n    +'<table cellpadding=\"0\" cellspacing=\"0\" style=\"border-collapse:collapse\">'\n    +mailRow('Când',mailEsc(nfDate(ev.date))+(ev.time?(', ora <b>'+ev.time+'<\u002Fb>'):''))\n    +mailRow('Categorie',mailEsc(c.n))\n    +mailRow('Participă',mailEsc(evMembersLabel(ev)))\n    +(ev.notes?mailRow('Notițe',mailEsc(ev.notes)):'')\n    +mailRow('Adăugat de',mailEsc(meName))\n    +'<\u002Ftable>'\n    +'<div style=\"margin:16px 0 4px\">'+mailBtn('Deschide FamLink')+'<\u002Fdiv>'\n    +'<div style=\"color:#7d938c;font-size:12.5px;margin-top:12px\">Atașat găsești invitația <b>.ics<\u002Fb> — deschide-o pe iPhone ca să adaugi activitatea direct în Calendar.<\u002Fdiv>';\n}\nfunction remMailHtml(ev,ds){\n  return mailKicker('Memento')\n    +mailTitle(ev.title)\n    +'<div style=\"font-size:14.5px;color:#1c2b26\">'+(ev.notify?('Începe în <b>'+nfMin(ev.notify)+'<\u002Fb>'):'<b>Chiar acum<\u002Fb>')+' — '+mailEsc(nfDate(ds))+' la <b>'+ev.time+'<\u002Fb><\u002Fdiv>'\n    +(ev.notes?('<div style=\"color:#7d938c;font-size:13px;margin-top:6px\">'+mailEsc(ev.notes)+'<\u002Fdiv>'):'')\n    +'<div style=\"margin:15px 0 4px\">'+mailBtn('Deschide FamLink')+'<\u002Fdiv>';\n}\nfunction nfDate(ds){const d=fromStr(ds);return DAYS[d.getDay()]+', '+d.getDate()+' '+MONTHS[d.getMonth()];}\nfunction defNotify(){const v=S.settings.defNotify;return v===undefined?30:v;}\n/* --- coadă locală (outbox): cererile se retrimit dacă nu e net --- */\nlet _nfBox=(function(){try{return JSON.parse(localStorage.getItem('famlink_pushq'))||[]}catch(e){return[]}})();\nfunction _nfSave(){localStorage.setItem('famlink_pushq',JSON.stringify(_nfBox.slice(-100)));}\nfunction pushQueue(p){if(!pushReady())return;_nfBox.push(p);_nfSave();flushPush();}\nasync function pushSend(p){\n  try{\n    const r=await fetch(PUSH().url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({secret:PUSH().secret},p))});\n    let d=null;try{d=await r.json();}catch(e){}\n    if(d&&d.ok)return {ok:true,d};\n    return {ok:false,fatal:true,err:(d&&d.err)||('HTTP '+r.status)}; // serverul a răspuns → nu reîncercăm la nesfârșit\n  }catch(e){return {ok:false,fatal:false,err:e.message};}         // eroare de rețea → reîncercăm mai târziu\n}\nlet _nfFlushing=false;\nasync function flushPush(){\n  if(_nfFlushing||!_nfBox.length||!pushReady()||navigator.onLine===false)return;\n  _nfFlushing=true;\n  try{\n    let guard=0;\n    while(_nfBox.length&&guard++<30){\n      const r=await pushSend(_nfBox[0]);\n      if(r.ok||r.fatal){_nfBox.shift();_nfSave();}\n      else break;\n    }\n  }finally{_nfFlushing=false;}\n}\nsetInterval(flushPush,5*60000);\nwindow.addEventListener('online',()=>setTimeout(flushPush,1500));\n/* --- notificare instant + programare mementouri pentru un eveniment --- */\nfunction pushOnEventChange(ev,isNew){\n  if(!pushReady())return;\n  try{\n    /* ev.mailNotify===false → utilizatorul a debifat „Anunță familia\" la această activitate */\n    if(pushOn('family',true)&&ev.mailNotify!==false){\n      const au=S.settings.activeUser||S.members[0].id;\n      const to=evEmails(ev); /* TOȚI membrii implicați, inclusiv autorul — emailul conține și invitația de calendar */\n      if(to.length){\n        const me=(memById(au)||{}).name||'Cineva';\n        pushQueue({action:'send',to,\n          title:'FamLink: '+ev.title+' — '+nfDate(ev.date)+(ev.time?(' '+ev.time):''),\n          body:me+' a '+(isNew?'adăugat':'modificat')+' „'+ev.title+'” — '+nfDate(ev.date)+(ev.time?(' la '+ev.time):'')+(ev.notes?('\\n'+ev.notes):'')+'\\nDeschide FamLink: '+appLink(),\n          html:mailWrap(evMailHtml(ev,me,isNew)),\n          ics:(typeof icsBody==='function')?icsBody([ev]):'',\n          icsName:'FamLink_'+String(ev.title).replace(/\\W+/g,'_').slice(0,40)+'.ics'});\n      }\n    }\n    pushScheduleEvent(ev);\n  }catch(e){}\n}\nfunction _evGroup(ev,days){\n  const g={prefix:'ev_'+ev.id+'_',items:[]};\n  if(ev.notify==null||!ev.time)return g;\n  const to=evEmails(ev);if(!to.length)return g;\n  const now=new Date();\n  for(let i=0;i<=(days||14);i++){\n    const d=new Date();d.setDate(d.getDate()+i);const ds=dstr(d);\n    if(!occursOn(ev,ds))continue;\n    const[h,m]=ev.time.split(':').map(Number);\n    const at=fromStr(ds);at.setHours(h,m,0,0);at.setMinutes(at.getMinutes()-Number(ev.notify||0));\n    if(at<=now)continue;\n    g.items.push({key:'ev_'+ev.id+'_'+ds,at:at.toISOString(),to,title:'Memento: '+ev.title,body:(ev.notify?('În '+nfMin(ev.notify)):'Chiar acum')+' — '+nfDate(ds)+' la '+ev.time+(ev.notes?('\\n'+ev.notes):'')+'\\nDeschide FamLink: '+appLink(),html:mailWrap(remMailHtml(ev,ds))});\n  }\n  return g;\n}\nfunction pushScheduleEvent(ev){\n  if(!pushReady()||!pushOn('event',true))return;\n  pushQueue({action:'schedule',groups:[_evGroup(ev,14)]});\n}\n/* --- programare completă (la deschiderea aplicației): evenimente + agenda zilei --- */\nfunction pushCatchUp(force){\n  if(!pushReady())return;\n  try{\n    const last=Number(localStorage.getItem('famlink_push_last')||0);\n    if(!force&&Date.now()-last<4*3600e3)return;\n    localStorage.setItem('famlink_push_last',String(Date.now()));\n    const groups=[],keep=[];\n    if(pushOn('event',true))S.events.forEach(ev=>{\n      if(ev.notify==null||!ev.time)return;\n      keep.push(ev.id);\n      const g=_evGroup(ev,14);\n      if(g.items.length)groups.push(g);\n    });\n    const dig={prefix:'dig_',items:[]};\n    if(pushOn('digest',false)){\n      const p=PUSH(),tm=/^\\d{1,2}:\\d{2}$/.test(p.digestTime||'')?p.digestTime:'07:30';\n      const to=[...new Set(S.members.map(m=>memEmail(m.id)).filter(Boolean))];\n      if(to.length)for(let i=0;i<3;i++){\n        const d=new Date();d.setDate(d.getDate()+i);const ds=dstr(d);\n        const evs=eventsOn(ds);if(!evs.length)continue;\n        const[h,m]=tm.split(':').map(Number);\n        const at=fromStr(ds);at.setHours(h,m,0,0);\n        if(at<=new Date())continue;\n        const lines=evs.map(e=>'• '+(e.time?e.time+' — ':'')+e.title+' ('+evMembersLabel(e)+')').join('\\n');\n        const dh=mailKicker('Agenda zilei')+mailTitle(nfDate(ds))\n          +evs.map(e=>'<div style=\"padding:7px 0;border-bottom:1px solid #eef5f1;font-size:14px;color:#1c2b26\">'+(e.time?('<b>'+e.time+'<\u002Fb> — '):'')+mailEsc(e.title)+' <span style=\"color:#7d938c;font-size:12.5px\">('+mailEsc(evMembersLabel(e))+')<\u002Fspan><\u002Fdiv>').join('')\n          +'<div style=\"margin:15px 0 4px\">'+mailBtn('Deschide FamLink')+'<\u002Fdiv>';\n        dig.items.push({key:'dig_'+ds,at:at.toISOString(),to,title:'Agenda zilei — '+nfDate(ds),body:lines+'\\nDeschide FamLink: '+appLink(),html:mailWrap(dh)});\n      }\n    }\n    groups.push(dig); // înlocuiește mereu agenda (o și curăță când e dezactivată)\n    pushQueue({action:'schedule',groups,sweepPrefix:'ev_',keep});\n    pushCronSync();\n  }catch(e){}\n}\n/* --- mementourile zilnice: cron per dispozitiv, pentru emailul membrului activ --- */\nlet _nfCronT=null;\nfunction pushCronSync(){\n  if(!pushReady())return;\n  clearTimeout(_nfCronT);\n  _nfCronT=setTimeout(()=>{\n    const em=myEmail();\n    const items=(pushOn('daily',true)&&em)?(S.settings.reminders||[]).filter(r=>r.on!==false).map(r=>({id:r.id,label:r.label,time:r.time||'',every:r.every||0})):[];\n    pushQueue({action:'cron',device:DID,email:em||'',items});\n  },1200);\n}\n/* --- UI Setări --- */\nfunction rPushUI(){\n  const box=document.getElementById('pushCard');if(!box)return;\n  const p=S.settings.push=S.settings.push||{};\n  if(!p.secret){p.secret='fl'+uid()+Math.random().toString(36).slice(2,10);p.u=Date.now();save();}\n  document.getElementById('pushUrl').value=p.url||'';\n  const st=document.getElementById('pushStatus');\n  st.innerHTML=p.url?'<b style=\"color:var(--pri2)\">Configurat ✓<\u002Fb> — notificările se trimit prin scriptul tău Gmail. Apasă „Testează\" dacă vrei să verifici.':'<b>Neconfigurat<\u002Fb> — deschide ghidul de mai jos și urmează cei 5 pași (o singură dată).';\n  if(!p.url)document.getElementById('pushGuide').open=true;\n  const defs={family:true,event:true,daily:true,fasting:true,digest:false};\n  const labels={family:'Activități noi/modificate de familie (instant)',event:'Memento înainte de evenimentele din calendar',daily:'Mementourile zilnice (apă, mese, personalizate)',fasting:'Fasting complet',digest:'Agenda zilei, dimineața (doar când există activități)'};\n  document.getElementById('pushToggles').innerHTML=Object.keys(labels).map(k=>{\n    const on=pushOn(k,defs[k]);\n    return `<label style=\"display:flex;align-items:center;gap:9px;margin:6px 0;cursor:pointer;font-weight:500\"><input type=\"checkbox\" ${on?'checked':''} onchange=\"setPushOn('${k}',this.checked)\" style=\"width:18px;height:18px;accent-color:var(--pri);flex:none\">${labels[k]}<\u002Flabel>`;\n  }).join('');\n  document.getElementById('pushDigTime').value=/^\\d{1,2}:\\d{2}$/.test(p.digestTime||'')?p.digestTime:'07:30';\n  const dn=S.settings.defNotify;\n  document.getElementById('setDefNotify').value=dn===undefined?'30':(dn===null?'':String(dn));\n  const who=S.members.filter(m=>memEmail(m.id)).map(m=>esc(m.name)+' ('+esc(memEmail(m.id))+')').join(', ');\n  document.getElementById('pushWho').innerHTML=who?('Primesc emailuri: '+who+'. Adresele se schimbă din <b>Familia<\u002Fb>.'):'<b>Atenție:<\u002Fb> niciun membru nu are email completat — adaugă adresele în secțiunea <b>Familia<\u002Fb> ca să ajungă notificările.';\n}\nfunction setPushOn(k,v){const p=S.settings.push=S.settings.push||{};p.on=p.on||{family:true,event:true,daily:true,fasting:true,digest:false};p.on[k]=!!v;p.u=Date.now();save();if(k==='daily')pushCronSync();if(k==='digest'||k==='event')pushCatchUp(true);toast(v?'Activat ✓':'Dezactivat');}\nfunction setPushUrl(v){const p=S.settings.push=S.settings.push||{};p.url=(v||'').trim();p.u=Date.now();save();rPushUI();if(p.url)flushPush();}\nfunction setDigestTime(v){const p=S.settings.push=S.settings.push||{};if(/^\\d{1,2}:\\d{2}$/.test(v||'')){p.digestTime=v;p.u=Date.now();save();pushCatchUp(true);toast('Agenda zilei la '+v);}}\nfunction setDefNotify(v){S.settings.defNotify=v===''?null:Number(v);save();toast(v===''?'Fără memento implicit':'Memento implicit setat');}\nfunction _gasCode(){const p=PUSH();return document.getElementById('gasCodeTpl').textContent.trim().replace(\"var SECRET = 'SCHIMBA-MA';\",\"var SECRET = '\"+(p.secret||'')+\"';\");}\nfunction pushCopyCode(){\n  rPushUI();\n  const code=_gasCode();\n  (navigator.clipboard?navigator.clipboard.writeText(code):Promise.reject()).then(()=>toast('Cod copiat ✓ — lipește-l în script.google.com')).catch(()=>{dl('famlink-notificari.gs',code,'text/plain');toast('Nu am putut copia — l-am descărcat ca fișier');});\n}\nfunction pushDlCode(){rPushUI();dl('famlink-notificari.gs',_gasCode(),'text/plain');toast('Fișier descărcat — deschide-l și copiază codul');}\nasync function pushTest(){\n  const p=PUSH();\n  if(!p.url)return toast('Lipește întâi URL-ul scriptului (pasul 5 din ghid)');\n  const st=document.getElementById('pushStatus');st.textContent='Trimit emailul de test…';\n  const r=await pushSend({action:'test',to:myEmail()?[myEmail()]:[]});\n  if(r.ok){\n    st.innerHTML='<b style=\"color:var(--pri2)\">Funcționează ✓<\u002Fb> — verifică-ți emailul ('+esc((r.d&&r.d.msg)||'trimis')+').';\n    toast('Test trimis ✓ Verifică emailul');\n    pushCatchUp(true);\n  }else{\n    st.innerHTML='<b style=\"color:#c0392b\">Eroare:<\u002Fb> '+esc(r.err||'necunoscută')+(/secret/.test(String(r.err||''))?' — recopiază codul din aplicație (conține secretul corect) și fă din nou Deploy.':' — verifică URL-ul (trebuie să se termine în /exec) și că la Deploy ai ales „Anyone\".');\n    toast('Nu a mers — vezi mesajul din Setări');\n  }\n}\nfunction pushInit(){\n  if(!pushReady())return;\n  setTimeout(flushPush,1200);\n  setTimeout(()=>pushCatchUp(false),3500); // după prima sincronizare\n}\n<\u002Fscript>\n<script>\n/* ============ GEMINI AI ============ */\nfunction rAI(){\n  document.getElementById('aiKeyWarn').innerHTML=S.settings.geminiKey?'':'Pune mai întâi cheia Gemini în <b>Setări → Gemini AI<\u002Fb>.';\n}\n/* lanț de rezervă: dacă modelul ales atinge limita (429) sau nu e disponibil, încearcă automat următorul gratuit */\nconst GEM_FALLBACK=['gemini-3.1-flash-lite','gemini-2.5-flash-lite','gemini-2.0-flash','gemini-2.5-flash','gemini-3-flash'];\n/* opt: {json:true → modul JSON nativ al API-ului (răspuns garantat JSON), temp: temperatura} */\nasync function gemini(parts,opt){\n  opt=opt||{};\n  const key=S.settings.geminiKey;\n  if(!key){toast('Adaugă cheia Gemini în Setări');throw new Error('no key');}\n  const primary=opt.model||S.settings.model||'gemini-2.5-flash';\n  const chain=[primary,...GEM_FALLBACK.filter(m=>m!==primary)];\n  let quotaHit=false,lastMsg='',badReq=false;\n  for(let idx=0;idx<chain.length;idx++){\n    const model=chain[idx];\n    const gen={temperature:opt.temp!=null?opt.temp:0.4};\n    if(opt.json)gen.responseMimeType='application/json';\n    if(opt.maxTokens)gen.maxOutputTokens=opt.maxTokens;\n    let r;\n    try{\n      r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`,{\n        method:'POST',headers:{'Content-Type':'application/json'},\n        body:JSON.stringify({contents:[{parts}],generationConfig:gen})\n      });\n    }catch(net){lastMsg='rețea';continue;}\n    if(r.ok){\n      if(idx>0)toast('Am folosit modelul de rezervă: '+model);\n      const d=await r.json();\n      return d.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'';\n    }\n    const e=await r.text();\n    // erori fatale — nu are rost să încercăm alt model\n    if(r.status===400&&/API[_ ]?key|API key not valid/i.test(e))throw new Error('Cheia API nu este validă. Verific-o în Setări → Gemini AI.');\n    if(r.status===401||r.status===403)throw new Error('Acces refuzat ('+r.status+'). Cheia nu are permisiuni pentru API.');\n    // 429 (cotă) / 404 (model inexistent) / 400 (model incompatibil) / 5xx → încearcă următorul\n    if(r.status===429)quotaHit=true;\n    if(r.status===400)badReq=true;\n    lastMsg='API '+r.status;\n  }\n  // dacă modul JSON nativ nu e suportat de niciun model, reîncearcă o dată fără el\n  if(badReq&&opt.json)return gemini(parts,Object.assign({},opt,{json:false}));\n  if(quotaHit)throw new Error('Toate modelele gratuite au atins limita pe azi. Cotele se resetează la miezul nopții ora Pacific (~10:00 România). Poți activa billing în Google AI Studio pentru fără limite.');\n  throw new Error('Nu am putut contacta niciun model ('+lastMsg+'). Verifică cheia și conexiunea.');\n}\n/* extrage JSON chiar dacă modelul a pus text sau ``` în jur */\nfunction parseAIJson(t){\n  t=String(t||'').replace(/```json|```/gi,'').trim();\n  try{return JSON.parse(t);}catch(e){}\n  const m=t.match(/\\{[\\s\\S]*\\}|\\[[\\s\\S]*\\]/);\n  if(m){try{return JSON.parse(m[0]);}catch(e){}}\n  throw new Error('AI-ul a răspuns într-un format neașteptat. Încearcă din nou.');\n}\nfunction fileToB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});}\n\n/* ton uman, nu de robot — folosit în toate cererile de text */\nconst AITON=' Foarte important pentru stil: scrie ca un specialist real care stă de vorbă cu mine, la persoana a doua („tu\"), natural, cald și direct — ca o discuție, nu ca un raport. Fără formule de salut („Bună ziua\"), fără încheieri gen „Sunt alături de tine\" sau „Succes!\", fără clișee motivaționale. Fără liste numerotate, fără puncte, fără bold, fără titluri, fără markdown — doar 2-3 paragrafe scurte de proză care curg firesc. Nu-mi repeta datele ca într-un tabel; interpretează-le și spune-mi ce înseamnă pentru mine.';\nlet _aiFood=null,_aiFoodImg=null;\nconst FOOD_PROMPT='Ești nutriționist. Analizează cu mare atenție mâncarea din poză: identifică exact alimentul (atenție la fructe/preparate asemănătoare — măr vs. prună, sarmale vs. chiftele etc.), ține cont de preparate românești și estimează realist mărimea porției din imagine. Răspunde DOAR cu JSON valid, fără markdown: {\"nume\":\"...\",\"portie_g\":număr,\"calorii\":număr,\"proteine_g\":număr,\"carbohidrati_g\":număr,\"grasimi_g\":număr,\"incredere\":\"mare|medie|mică\",\"evaluare\":\"o frază naturală, la persoana a doua („tu\"), despre cât de potrivită e pentru slăbit — fără clișee\",\"sugestie\":\"o sugestie scurtă și firească de îmbunătățire, la persoana a doua\"}';\nasync function aiAnalyze(){\n  const f=_photoBlob||document.getElementById('aiPhoto').files[0];\n  if(!f)return toast('Fă o poză sau alege una mai întâi');\n  const out=document.getElementById('aiPhotoOut');\n  out.innerHTML=aiLoad('Analizez poza…');\n  try{\n    const b64=await fileToB64(f);\n    _aiFoodImg={mime:f.type||'image/jpeg',data:b64};\n    const txt=await gemini([{inline_data:{mime_type:_aiFoodImg.mime,data:_aiFoodImg.data}},{text:FOOD_PROMPT}],{json:true,temp:0.2});\n    _aiFood=parseAIJson(txt);\n    renderFoodResult();\n  }catch(e){out.innerHTML=aiErr('Eroare: '+esc(e.message));}\n}\nfunction renderFoodResult(){\n  const j=_aiFood;\n  const conf=j.incredere==='mică'?'<p style=\"color:var(--amber);font-size:12.5px;font-weight:600;margin:0 0 6px;white-space:normal\">Nu sunt 100% sigur — corectează mai jos dacă am greșit.<\u002Fp>':'';\n  aiShow('aiPhotoOut',`<div class=\"row\" style=\"gap:8px;flex-wrap:wrap;white-space:normal\"><div style=\"flex:2;min-width:150px\"><label style=\"margin-top:0\">Aliment (poți edita)<\u002Flabel><input id=\"aiFoodName\" value=\"${esc(j.nume||'')}\"><\u002Fdiv><div style=\"flex:1;min-width:80px\"><label>Kcal<\u002Flabel><input id=\"aiFoodCal\" type=\"number\" min=\"0\" value=\"${Number(j.calorii)||0}\"><\u002Fdiv><\u002Fdiv><div class=\"macros\">${j.portie_g?('<div class=\"macro\"><b>'+Number(j.portie_g)+' g<\u002Fb><span>porție<\u002Fspan><\u002Fdiv>'):''}<div class=\"macro\"><b>${Number(j.proteine_g)||0} g<\u002Fb><span>proteine<\u002Fspan><\u002Fdiv><div class=\"macro\"><b>${Number(j.carbohidrati_g)||0} g<\u002Fb><span>carbo<\u002Fspan><\u002Fdiv><div class=\"macro\"><b>${Number(j.grasimi_g)||0} g<\u002Fb><span>grăsimi<\u002Fspan><\u002Fdiv><\u002Fdiv>${conf}${esc(j.evaluare||'')}${j.sugestie?('\\nSugestie: '+esc(j.sugestie)):''}`,\n  `<div class=\"row\" style=\"margin-top:8px;gap:8px\"><input id=\"aiFoodFix\" class=\"grow\" placeholder=\"AI a greșit? Scrie corecția: „e măr, nu prună”\" onkeydown=\"if(event.key==='Enter')aiFoodFix()\"><button class=\"btn sec\" onclick=\"aiFoodFix()\"><i data-lucide=\"wand-2\"><\u002Fi>Corectează<\u002Fbutton><\u002Fdiv><button class=\"btn\" style=\"margin-top:8px;width:100%\" onclick=\"aiFoodAdd()\"><i data-lucide=\"plus\"><\u002Fi>Adaugă la mesele de azi<\u002Fbutton>`);\n}\nasync function aiFoodFix(){\n  const fix=(document.getElementById('aiFoodFix')?.value||'').trim();\n  if(!fix)return toast('Scrie ce e greșit, ex: „e măr, nu prună”');\n  if(!_aiFood||!_aiFoodImg)return toast('Analizează întâi o poză');\n  const out=document.getElementById('aiPhotoOut');\n  out.innerHTML=aiLoad('Refac analiza cu corecția ta…');\n  try{\n    const txt=await gemini([\n      {inline_data:{mime_type:_aiFoodImg.mime,data:_aiFoodImg.data}},\n      {text:FOOD_PROMPT+`\nIMPORTANT: analiza anterioară a fost ${JSON.stringify(_aiFood)}, dar utilizatorul (care vede alimentul în realitate) te corectează: \"${fix}\". Corecția lui e adevărul absolut. Refă TOATE valorile (nume, porție, calorii, macro, evaluare, sugestie) pornind de la corecția lui; folosește poza doar pentru a estima porția.`}\n    ],{json:true,temp:0.2});\n    _aiFood=parseAIJson(txt);\n    renderFoodResult();\n    toast('Analiză corectată ✓');\n  }catch(e){out.innerHTML=aiErr('Eroare: '+esc(e.message));}\n}\nfunction aiFoodAdd(){\n  const n=(document.getElementById('aiFoodName')?.value||'Masă').trim()||'Masă';\n  const c=Number(document.getElementById('aiFoodCal')?.value)||0;\n  quickMeal(n,c,'Prânz');dTab('meal');\n}\n\nasync function aiMenu(){\n  const out=document.getElementById('aiMenuOut');\n  const p=getProf(),w=lastW(),c=calc(p,w);\n  out.innerHTML=aiLoad('Generez meniul…');\n  const eaten=todayMeals().map(m=>m.type+': '+m.name+' ('+m.cal+' kcal)').join('; ')||'nimic încă';\n  try{\n    const txt=await gemini([{text:`Ești nutriționist. Persoană: ${p.sex==='F'?'femeie':'bărbat'}, ${p.age||'?'} ani, ${p.h||'?'} cm, ${w||'?'} kg, țintă ${p.target||'?'} kg. Ținta calorică zilnică: ${c?c.target:'~1800'} kcal. A mâncat azi: ${eaten}. Face fasting ${S.diet.fasting.hours||16}:${24-(S.diet.fasting.hours||16)}. Propune-mi restul meselor de azi ca să mă încadrez în țintă — spune fiecare masă cu kcalul ei aproximativ, ingrediente comune din România, simplu de gătit, totul într-o proză scurtă și firească.${AITON} Maxim 120 de cuvinte.`}]);\n    aiShow('aiMenuOut',esc(txt));\n  }catch(e){out.innerHTML=aiErr('Eroare: '+esc(e.message));}\n}\n\nasync function aiProfile(){\n  const out=document.getElementById('aiProfOut');\n  const p=getProf(),w=lastW(),c=calc(p,w),b=bodyCalc();\n  if(!c)return toast('Completează și salvează profilul mai întâi');\n  out.innerHTML=aiLoad('Analizez profilul…');\n  const ws=(S.diet.weights[dietMid()]||[]).slice(-10).map(x=>x.d+': '+x.w+' kg').join(', ');\n  try{\n    const txt=await gemini([{text:`Ești un nutriționist cu experiență și vorbești direct cu mine, în română. Datele mele: ${p.sex==='F'?'femeie':'bărbat'}, ${p.age} ani, ${p.h} cm, ${w} kg, țintă ${p.target||'?'} kg, IMC ${c.bmi}, BMR ${c.bmr} kcal, TDEE ${c.tdee} kcal, necesar zilnic ${c.target} kcal.${b?` Grăsime corporală estimată ${b.bf}% (US Navy), talie/înălțime ${b.whtr}.`:''} Istoric cântăriri: ${ws||'doar una'}. Spune-mi firesc unde sunt acum, ce ritm de slăbire e realist și cam în câte săptămâni ajung la țintă, și ce aș putea schimba concret în alimentație și mișcare.${AITON} Maxim 120 de cuvinte.`}]);\n    aiShow('aiProfOut',esc(txt));\n  }catch(e){out.innerHTML=aiErr('Eroare: '+esc(e.message)+' — verifică cheia în Setări.');}\n}\nasync function aiBody(){\n  const out=document.getElementById('aiBodyOut');\n  const p=getProf(),w=lastW(),b=bodyCalc();\n  if(!b)return toast('Completează măsurile și apasă Calculează mai întâi');\n  out.innerHTML=aiLoad('Pregătesc sfaturile…');\n  try{\n    const txt=await gemini([{text:`Ești antrenor și nutriționist, bazează-te pe ghidurile OMS/CDC/ACSM. Persoană: ${p.sex==='F'?'femeie':'bărbat'}, ${p.age} ani, ${p.h} cm, ${w} kg, grăsime corporală ${b.bf}% (categoria ${bfCat(b.bf,p.sex)}), talie ${p.waist} cm, talie/înălțime ${b.whtr}, masă slabă ${b.leanKg} kg. Spune-mi firesc un mini-plan pe 4 săptămâni: ce mișcare să fac (tipuri și cam câte minute pe săptămână), câteva obiceiuri alimentare de schimbat și un singur indicator pe care să-l urmăresc săptămânal.${AITON} Maxim 140 de cuvinte.`}]);\n    aiShow('aiBodyOut',esc(txt));\n  }catch(e){out.innerHTML=aiErr('Eroare: '+esc(e.message)+' — verifică cheia în Setări.');}\n}\n\n/* ---------- Adăugare activități din text (folosit de asistent) ---------- */\nlet _aiBusy=false,_pendingEv=null,_pendingCb=null;\nasync function addEventsFromText(text,spoken,cb){\n  cb=cb||function(){};\n  if(_aiBusy)return;\n  text=(text||'').trim();\n  if(!text)return cb('Scrie ce vrei să adaugi.',true);\n  if(!S.settings.geminiKey)return cb('Adaugă întâi cheia Gemini în Setări.',true);\n  _aiBusy=true;\n  const today=todayStr();\n  const _now=new Date();\n  const dow=DAYS[_now.getDay()];\n  const _rel={0:' (AZI)',1:' (mâine)',2:' (poimâine)'};\n  let dateRef='';\n  for(let i=0;i<14;i++){const _d=new Date(_now.getFullYear(),_now.getMonth(),_now.getDate()+i);dateRef+=dstr(_d)+' = '+DAYS[_d.getDay()]+(_rel[i]||'')+'\\n';}\n  const au=S.settings.activeUser||S.members[0].id;\n  const meName=(memById(au)||{}).name||'utilizator';\n  const memList=S.members.map(m=>m.id+'='+m.name).join(', ')||'(niciunul)';\n  const allIds=S.members.map(m=>'\"'+m.id+'\"').join(',');\n  try{\n    const txt=await gemini([{text:`Azi este ${dow}, ${today} (format YYYY-MM-DD).\nCALENDAR PE 14 ZILE — folosește EXACT aceste date pentru orice zi a săptămânii și pentru „azi/mâine/poimâine/săptămâna viitoare\"; NU calcula singur ziua săptămânii:\n${dateRef}Regulă zile: pentru o zi simplă (ex. „miercuri\") alege PRIMA apariție din tabel (cea mai apropiată, azi inclus); pentru „... viitoare\" / „săptămâna viitoare\" alege apariția din săptămâna următoare.\nTransformă textul următor în una sau mai multe activități de calendar. Text: \"${text}\". Membri (id=nume): ${memList}. Utilizatorul conectat, cel care face programarea, este: ${meName} (id=${au}). Categorii permise, folosește cheia exactă: familie, sport, scoala, sanatate, munca, eveniment, altele. Poți întoarce fie evenimente de calendar (kind=\"event\"), fie mementouri = notificări recurente fără dată (kind=\"memento\"). Răspunde DOAR cu JSON valid, un array, fără markdown și fără explicații: [{\"kind\":\"event|memento\",\"title\":\"\",\"date\":\"YYYY-MM-DD\",\"time\":\"HH:MM sau gol\",\"every\":ore_ca_număr_sau_0,\"dur\":minute_ca_număr,\"cat\":\"cheie\",\"members\":[\"id\"],\"recur\":{\"f\":\"none|d|w|m|y\",\"int\":1,\"until\":\"YYYY-MM-DD sau gol\"},\"notes\":\"\"}].\nDISTINCȚIE kind (important): dacă textul are o ZI/DATĂ anume (azi, mâine, „miercuri\", „pe 12\", un weekend, o dată clară) → kind=\"event\" cu date (și time dacă se spune ora). Dacă e ceva care se REPETĂ fără dată calendaristică — zilnic la o oră („în fiecare zi la 9 ia pastila\", „amintește-mi seara să…\") sau la interval („la fiecare 2 ore bea apă\") → kind=\"memento\" (time=ora zilnică SAU every=numărul de ore; fără date/recur). În dubiu, dacă există o zi anume → event.\nREGULI PENTRU \"members\" (foarte important). Contează DOAR numele care apar în lista de membri de mai sus (aceia au aplicația). Orice alt nume care NU e în listă NU e membru (ex. un prieten fără aplicație).\n- Dacă NU e menționată nicio persoană → activitatea e a utilizatorului conectat: members=[\"${au}\"].\n- Dacă e menționată și o altă persoană care ESTE în lista de membri → activitate COMUNĂ de familie: members=[${allIds}].\n- Dacă persoana menționată NU e în lista de membri → NU e comună: members=[\"${au}\"], iar numele persoanei se adaugă în titlu (ex. \"Cină cu Alin\").\n- Dacă se cere EXPLICIT doar pentru altcineva care ESTE membru (ex. \"doar pentru Alisa\", \"programează-i lui Alisa\") → members=[\"id_acelui_membru\"] (fără utilizatorul conectat).\n- Dacă mai multe persoane sunt menționate, sunt COMUNE doar dacă cel puțin una (în afară de tine) e în lista de membri.\nAlte reguli: pentru întâlniri repetate (\"în fiecare luni\", \"săptămânal\") pune recur.f=\"w\" și date pe prima apariție viitoare; pentru evenimente pe mai multe zile (congres, târg, concediu, ex \"12-14 septembrie\") pune o singură activitate cu recur.f=\"d\", int=1, until=ultima zi și cat=\"eveniment\"; dacă anul lipsește alege cea mai apropiată dată viitoare; time gol dacă nu se spune ora.${spoken?' ATENȚIE: textul a fost DICTAT prin voce, deci poate conține greșeli de transcriere, cuvinte lipite, numere scrise în litere (\"la zece\"→10:00) sau nume proprii transcrise fonetic. Interpretează-l fonetic și după sens, corectează greșelile evidente și extrage intenția reală.':''}\nREGULĂ TITLU (foarte important): numele proprii, denumirile de firme/bănci/aplicații/produse și cuvintele străine (ex. engleză: \"open account\", \"meeting\", \"Chorus\") se păstrează EXACT cum apar în text — NU le înlocui cu cuvinte românești care sună asemănător și NU ghici o altă activitate din ele (ex. \"Chorus\" NU devine \"cor\"). Corectează doar greșeli evidente de transcriere unde intenția e clară; dacă un cuvânt-cheie e neclar, lasă-l neschimbat în titlu.`}],{json:true,temp:0.2});\n    let arr=parseAIJson(txt);\n    if(!Array.isArray(arr))arr=[arr];\n    const cands=[],rems=[];\n    arr.forEach(e=>{\n      if(!e||!e.title)return;\n      const hasDate=/^\\d{4}-\\d{2}-\\d{2}$/.test(e.date||'');\n      if(!hasDate&&(e.kind==='memento'||Number(e.every)>0)){ // memento: notificare recurentă, fără dată calendaristică\n        rems.push({label:String(e.title),time:/^\\d{1,2}:\\d{2}$/.test(e.time||'')?e.time:'',every:Number(e.every)||0});\n        return;\n      }\n      let members=Array.isArray(e.members)?e.members.filter(id=>memById(id)):[];\n      if(!members.length)members=[au]; // implicit: utilizatorul conectat\n      cands.push({\n        id:uid(),title:String(e.title),\n        date:hasDate?e.date:today,\n        time:/^\\d{1,2}:\\d{2}$/.test(e.time||'')?e.time:'',\n        dur:Number(e.dur)||60,\n        cat:CATS[e.cat]?e.cat:'altele',\n        members,\n        recur:(e.recur&&e.recur.f&&e.recur.f!=='none')?{f:e.recur.f,int:Number(e.recur.int)||1,until:/^\\d{4}-\\d{2}-\\d{2}$/.test((e.recur.until)||'')?e.recur.until:''}:{f:'none'},\n        notify:(/^\\d{1,2}:\\d{2}$/.test(e.time||'')&&typeof defNotify==='function'&&defNotify()!=null)?defNotify():null,notes:e.notes||'',u:Date.now()\n      });\n    });\n    rems.forEach(r=>addReminderCore(r.label,r.time,r.every));\n    const remMsg=rems.length?('Memento: '+rems.map(r=>r.label+(r.every?(' (la '+r.every+'h)'):(r.time?(' '+r.time):''))).join('; ')):'';\n    if(!cands.length){\n      if(rems.length){toast('Memento adăugat ✓');cb('Adăugat la Mementouri — '+remMsg,false);}\n      else cb('Nu am putut interpreta. Reformulează, te rog.',true);\n      return;\n    }\n    if(rems.length)toast('Memento adăugat ✓');\n    const warn=sanityWarn(cands);\n    _pendingEv=cands;_pendingCb=cb;showEvConfirm(warn,cands);return;\n  }catch(err){cb('Eroare: '+err.message,true);}\n  finally{_aiBusy=false;}\n}\nfunction evMembersLabel(e){\n  const ms=(e.members||[]).filter(id=>memById(id));\n  if(!ms.length||ms.length===S.members.length)return 'toată familia';\n  return ms.map(id=>memById(id).name).join(', ');\n}\nfunction evSummary(e){\n  const rec=e.recur&&e.recur.f!=='none'?(e.recur.f==='d'&&e.recur.until?(' · zilnic până la '+e.recur.until):' · se repetă'):'';\n  return esc(e.title)+' — '+e.date+(e.time?' '+e.time:'')+rec+' · '+esc(evMembersLabel(e));\n}\nfunction sanityWarn(cands){\n  const reasons=[],now=new Date();\n  if(cands.length>5)reasons.push('adaugă '+cands.length+' activități deodată');\n  cands.forEach(e=>{\n    const yrs=(fromStr(e.date)-now)/(365*864e5);\n    if(yrs>2)reasons.push('„'+e.title+'\" e programată peste ~'+Math.round(yrs)+' ani');\n    if(yrs<-0.5)reasons.push('„'+e.title+'\" e în trecut ('+e.date+')');\n    if(e.recur.f==='d'&&!e.recur.until)reasons.push('„'+e.title+'\" se repetă ZILNIC, la nesfârșit');\n    if((e.title||'').length>80)reasons.push('un titlu neobișnuit de lung');\n  });\n  return reasons.length?reasons.join('; '):null;\n}\nfunction commitEvents(cands,cb){\n  cands.forEach(ev=>S.events.push(ev));\n  save();\n  cands.forEach(ev=>{try{pushOnEventChange(ev,true);}catch(e){}});\n  const f=fromStr(cands[0].date);VM={y:f.getFullYear(),m:f.getMonth()};\n  render();\n  (cb||function(){})('Adăugat în calendar: '+cands.map(evSummary).join('; '),false);\n  toast('Adăugat ✓');\n}\nfunction showEvConfirm(reason,cands){\n  document.getElementById('confTitle').innerHTML=reason?'<i data-lucide=\"alert-triangle\"><\u002Fi>Ești sigur?':'<i data-lucide=\"calendar-check\"><\u002Fi>Vrei să adaugi?';\n  document.getElementById('confReason').textContent=reason?('Pare ceva neobișnuit: '+reason+'. Vrei să continui?'):(cands.length>1?'Am pregătit '+cands.length+' programări. Le adaug în calendar?':'Am pregătit programarea. O adaug în calendar?');\n  document.getElementById('confList').innerHTML=cands.map(e=>'<div class=\"okline\"><i data-lucide=\"calendar\" class=\"ok-i\"><\u002Fi><div>'+evSummary(e)+'<\u002Fdiv><\u002Fdiv>').join('');\n  document.getElementById('confBack').classList.add('show');LI();\n}\nfunction confirmEvents(yes){\n  document.getElementById('confBack').classList.remove('show');\n  const c=_pendingEv,cb=_pendingCb;_pendingEv=null;_pendingCb=null;\n  if(yes&&c&&c.length){\n    commitEvents(c,cb);\n    if(yes==='edit')openEvent(c[0].id);\n  }\n  else if(cb)cb('Am anulat — nu am adăugat nimic.',false);\n}\n\n/* ---------- Cameră foto ---------- */\nlet _camStream=null,_photoBlob=null;\nasync function openCamera(){\n  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return toast('Camera nu e disponibilă aici. Folosește „Din galerie\".');\n  try{\n    _camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});\n    const v=document.getElementById('camVideo');v.srcObject=_camStream;try{await v.play();}catch(e){}\n    document.getElementById('camBack').classList.add('show');LI();\n  }catch(e){toast('Nu am putut porni camera: '+(e.name||e.message)+'. Încearcă „Din galerie\" sau versiunea online (https).');}\n}\nfunction closeCamera(){\n  if(_camStream){_camStream.getTracks().forEach(t=>t.stop());_camStream=null;}\n  const v=document.getElementById('camVideo');if(v)v.srcObject=null;\n  document.getElementById('camBack').classList.remove('show');\n}\nfunction snapPhoto(){\n  const v=document.getElementById('camVideo');\n  if(!v||!v.videoWidth)return toast('Camera nu e gata încă');\n  const c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;\n  c.getContext('2d').drawImage(v,0,0);\n  c.toBlob(b=>{if(!b)return toast('Captură eșuată');b.name='poza.jpg';_photoBlob=b;showPhotoPrev(URL.createObjectURL(b));closeCamera();toast('Poză capturată ✓');},'image/jpeg',0.9);\n}\nfunction photoPicked(inp){const f=inp.files[0];if(!f)return;_photoBlob=f;showPhotoPrev(URL.createObjectURL(f));}\nfunction showPhotoPrev(url){document.getElementById('photoPrev').innerHTML='<div class=\"photoprev\"><img src=\"'+url+'\" alt=\"poză masă\"><button class=\"aix\" title=\"Șterge poza\" onclick=\"clearPhoto()\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton><\u002Fdiv>';LI();}\nfunction clearPhoto(){_photoBlob=null;document.getElementById('photoPrev').innerHTML='';const inp=document.getElementById('aiPhoto');if(inp)inp.value='';}\n\n/* ---------- Dictare vocală (transcriere live
